predictor_name_default: "ODE_default"
# If controller does not specify predictor_specification (leave empty)
# a predictor from "predictors:predictor_name_default" from below is loaded
# Check config.yml and config_testing.yml to learn more on how predictors are selected

predictors:
  ### THESE ARE DEFAULT PREDICTORS! DON'T CHANGE THEM, RATHER ADD YOUR PREDICTOR BELOW
  neural_default:
    predictor_type: "neural"
    model_name: "Dense-10IN-64H1-128H2-64H3-8OUT-0"
    path_to_model: "./SI_Toolkit_ASF/Experiments/Experiments_19_11_2025_BackToFront/Models/"
    update_before_predicting: True
  neural_flo:
    predictor_type: "neural"
    model_name: "Dense-10IN-64H1-128H2-64H3-8OUT-0"
    path_to_model: "./SI_Toolkit_ASF/Experiments/ContinualLearning/Models/"
    update_before_predicting: False
  neural_parameter_determination:
    predictor_type: "neural"
    model_name: "Custom-11IN-ODE_module-STModel-9OUT-0"
    path_to_model: "./SI_Toolkit_ASF/Experiments/ContinualLearning/Models/"
    update_before_predicting: False
  GP_default:
    predictor_type: "GP"
    model_name: "SGP_10"
    path_to_model: "./SI_Toolkit_ASF/Experiments/Tutorial/Models/"
  ODE_default:
    predictor_type: "ODE"
    model_name:
    intermediate_steps: 1
    computation_library_name: "TF" # One of "Numpy", "TF", "Pytorch".
    control_inputs: ['angular_control', 'translational_control']
    state_variables: ['angular_vel_z', 'linear_vel_x', 'linear_vel_y', 'pose_theta', 'pose_theta_cos', 'pose_theta_sin', 'pose_x', 'pose_y', 'slip_angle', 'steering_angle']
  
  # ODE with mu as control input (for back-to-front predictions with neural network)
  ODE_with_mu:
    predictor_type: "ODE"
    model_name:
    intermediate_steps: 1
    computation_library_name: "TF"
    control_inputs: ['angular_control', 'translational_control', 'mu']
    # Full 10-state vector (alphabetically sorted as expected by car_model)
    # NN output is augmented to 10 states before passing to ODE
    state_variables: ['angular_vel_z', 'linear_vel_x', 'linear_vel_y', 'pose_theta', 'pose_theta_cos', 'pose_theta_sin', 'pose_x', 'pose_y', 'slip_angle', 'steering_angle']
  ODE_TF_default:
    predictor_type: "ODE"
    model_name:
    intermediate_steps: 2
    control_inputs: ['angular_control', 'translational_control']
    state_variables: ['angular_vel_z', 'linear_vel_x', 'linear_vel_y', 'pose_theta', 'pose_theta_cos', 'pose_theta_sin', 'pose_x', 'pose_y', 'slip_angle', 'steering_angle']

  backward_optimizer_default:
    predictor_type: "backward_optimizer"
    # Neural network model for 'network' and 'hybrid' modes (set FORGED_HISTORY_MODE in Settings.py)
    model_name: "Dense-9IN-32H1-32H2-8OUT-1"
    path_to_model: "./SI_Toolkit_ASF/Experiments/Experiments_05_12_2025/Models/"

  data_integrator_default:
    predictor_type: "data_integrator"
    model_name:
    computation_library_name: "Numpy"  # One of "Numpy", "TF", "Pytorch"

  # ADD YOUR PREDICTORS BELOW

  I_love_control:
    predictor_type: "neural" # Possible options are: 'neural', 'GP', 'ODE, 'ODE_TF'
    model_name:
    path_to_model: "./SI_Toolkit_ASF/Experiments/Pretrained-RNN-1/Models/"
    update_before_predicting: True

  I_love_control_too:
    predictor_type: "ODE"
    model_name:
    intermediate_steps: 10
    control_inputs: ['angular_control', 'translational_control']
    state_variables: ['angular_vel_z', 'linear_vel_x', 'linear_vel_y', 'pose_theta', 'pose_theta_cos', 'pose_theta_sin', 'pose_x', 'pose_y', 'slip_angle', 'steering_angle']
