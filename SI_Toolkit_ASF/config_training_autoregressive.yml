# Configuration for AUTOREGRESSIVE training
# This trains a Dense network using closed-loop prediction over a trajectory horizon
# instead of single-step teacher-forcing training.
#
# Key differences from standard training:
# - NET_NAME uses "Custom-AutoregressiveDense" format to load the custom module
# - POST_WASH_OUT_LEN determines the trajectory horizon (e.g., 20 steps)
# - The network learns to minimize trajectory error, not just single-step error
#
# Usage: Copy this file to config_training.yml or run training with --config flag

library: "TF" # Only TF supported for autoregressive training

modeling:
  # ============================================================================
  # OPTION 1: Train a NEW network from scratch with autoregressive training
  # ============================================================================
  # Format: Custom-<ClassName>
  # Available classes:
  #   - AutoregressiveDense64H1_64H2 (64-64 hidden layers)
  #   - AutoregressiveDense128H1_128H2 (128-128)
  #   - AutoregressiveDense64H1_128H2_64H3 (64-128-64)
  #   - AutoregressiveDense32H1_64H2_32H3 (32-64-32)
  NET_NAME: "Custom-AutoregressiveDense64H1_64H2"
  
  # ============================================================================
  # OPTION 2: Fine-tune an EXISTING pretrained network 
  # ============================================================================
  # Format: Custom-AutoregressivePretrained-<YourPretrainedModelName>
  # Example:
  # NET_NAME: "Custom-AutoregressivePretrained-Dense-9IN-64H1-64H2-8OUT-0"
  #
  # The pretrained model will be loaded from PATH_TO_EXPERIMENT_FOLDERS/Models/
  # ============================================================================
  
  SPECIAL_RNN:
    TYPE: 'standard'
    MASK_PERCENT: 0
    DELTA_L1_COEFF: 0.0
    DELTA_L0_COEFF: 0.0
    DELTA_L0_SCALE: 1.0
    DELTA_THETA_X: 0.0
    DELTA_THETA_H: 0.0
    GATE_L1_COEFF: 0.0
    GATE_L0_COEFF: 0.0
    GATE_THRESHOLD: 0.0
    PENALIZE_UPDATE_GATE_OPEN: false
    L0_BETA: 0.6666666667
    L0_GAMMA: -0.1
    L0_ZETA: 1.1

paths:
  path_to_experiment: ""
  PATH_TO_EXPERIMENT_FOLDERS: "./SI_Toolkit_ASF/Experiments/Experiments_05_12_2025_BackToFront_shifted/"
  DATA_FOLDER: 'Recordings'

training_default:
  # State inputs - these are fed to the network and used for autoregressive prediction
  state_inputs:
    [
      "pose_theta_cos",
      "pose_theta_sin",
      "linear_vel_x",
      "angular_vel_z",
      "slip_angle",
      "steering_angle",
    ]
  
  # Control inputs - external inputs that drive the trajectory
  control_inputs: ["translational_control_-1", "angular_control_-1", "mu"]
  
  # Outputs - derivatives that will be integrated autoregressively
  outputs:
    [
      "D_pose_theta_cos_-1",
      "D_pose_theta_sin_-1",
      "D_pose_x_-1",
      "D_pose_y_-1",
      "D_linear_vel_x_-1",
      "D_angular_vel_z_-1",
      "D_slip_angle_-1",
      "D_steering_angle_-1",
    ]

  setpoint_inputs: []

  EPOCHS: 100
  BATCH_SIZE: 32  # Smaller batch size recommended for autoregressive training (more memory intensive)
  SEED: 1873
  
  LR:
    INITIAL: 1.0e-3  # Start with slightly lower LR for autoregressive training
    REDUCE_LR_ON_PLATEAU: True
    MINIMAL: 1.0e-6
    PATIENCE: 3  # More patience since trajectory loss is harder to optimize
    DECREASE_FACTOR: 0.5
    MIN_DELTA: 0.00
  
  LOSS_MODE: 'squared'  # 'squared', 'squared_with_clipping', 'absolute', 'absolute_with_clipping'
  
  # CRITICAL PARAMETERS FOR AUTOREGRESSIVE TRAINING:
  # WASH_OUT_LEN: Not used for Dense networks
  # POST_WASH_OUT_LEN: This is the trajectory horizon length!
  #   - The network will predict this many steps autoregressively
  #   - Loss is computed over the entire trajectory
  #   - Larger values = longer-term prediction but harder to train
  #   - Start with 10-20, can increase after initial convergence
  WASH_OUT_LEN: 0
  POST_WASH_OUT_LEN: 20  # <-- TRAJECTORY HORIZON (20 steps = 0.4s at 50Hz)
  
  ON_FLY_DATA_GENERATION: False
  NORMALIZE: True
  SHIFT_LABELS: 1  # Labels are shifted by 1 for prediction (predict next state)
  USE_NNI: False
  CONSTRUCT_NETWORK: 'with cells'
  VALIDATE_ALSO_ON_TRAINING_SET: false
  PLOT_WEIGHTS_DISTRIBUTION: false

CONFIG_SERIES_MODIFICATION:
  MODE: 'None'
  NOISE_LEVEL:
    FEATURES: 0.0

REGULARIZATION:
  ACTIVATED: false
  KERNEL:
    l1: 0.001
    l2: 0.001
  BIAS:
    l1: 0.001
    l2: 0.001
  ACTIVITY:
    l1: 0.00
    l2: 0.00
  ACTIVITY_LAST:
    l1: 0.0
    l2: 0.001

QUANTIZATION:
  ACTIVATED: false
  QUANTIZATION_DATASET: 'ap_fixed<12,2>'
  ACTIVATION:
    bits: 12
  KERNEL:
    bits: 12
    integer: 3
    symmetric: True
  BIAS:
    bits: 12
    integer: 3
    symmetric: True
  RECURRENT:
    bits: 12
    integer: 3
    symmetric: True

PRUNING:
  ACTIVATED: false
  PRUNING_PARAMS:
    PRUNING_SCHEDULE: 'CONSTANT_SPARSITY'
  PRUNING_SCHEDULES:
    CONSTANT_SPARSITY:
      target_sparsity: 0.75
      target_sparsity_last_layer: 0.0
      begin_step_in_epochs: 1.0
      end_step_in_training_fraction: 1.0
      frequency_per_epoch: 100.0
    POLYNOMIAL_DECAY:
      initial_sparsity: 0.0
      final_sparsity: 0.75
      final_sparsity_last_layer: 0.0
      begin_step_in_epochs: 1.0
      end_step_in_training_fraction: 0.8
      power: 3.0
      frequency_per_epoch: 1000

FILTERS: False

