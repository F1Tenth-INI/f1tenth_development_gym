<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward Components</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header>
    <h1>Reward Components</h1>
    <p id="meta-line" class="meta-line">Loading episodes.csv…</p>
    <div class="controls">
      <label title="Training model directory">
        Model
        <select id="model-select" disabled>
          <option value="">Loading models…</option>
        </select>
      </label>
      <label title="Training episode index (0 = first completed episode)">
        Episode
        <input type="range" id="episode-slider" min="0" max="0" value="0" step="1" disabled>
      </label>
      <output id="episode-slider-value" for="episode-slider">—</output>
      <button type="button" id="episode-play" class="secondary-btn" disabled>Play</button>
      <label title="Episode playback speed">
        Speed [ep/s]
        <input type="number" id="episode-play-hz" min="0.1" max="60" step="0.5" value="2">
      </label>
      <span id="episode-meta" class="inline-meta">—</span>
    </div>
  </header>

  <main>
    <div id="plot-reward-components" class="plot"></div>
  </main>

  <p id="status" class="status" aria-live="polite"></p>
  <script src="app.js"></script>
</body>
</html>
