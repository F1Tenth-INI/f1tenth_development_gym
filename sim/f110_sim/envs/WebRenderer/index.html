<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1TENTH Web Renderer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #091f56; color: #fff; font-family: sans-serif; }
    #root { display: grid; grid-template-rows: 72px 1fr; height: 100%; }
    #topbar { display: flex; align-items: center; gap: 16px; padding: 0 12px; background: #0d2f7b; }
    #status { font-size: 14px; opacity: 0.95; white-space: pre-line; }
    #controls { display: flex; align-items: center; gap: 14px; margin-left: auto; font-size: 13px; }
    #controls label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    #controls { flex-wrap: wrap; }
    #toggle-follow {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #toggle-follow.active { background: #ac61b9; border-color: #d9b3e8; }
    .topbar-toggle {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #toggle-plots.active { background: #5c4d7a; border-color: #b8a9d9; }
    #toggle-sac-metrics {
      display: none;
    }
    #toggle-sac-metrics.active { background: #2d6a4f; border-color: #95d5b2; }
    .side-panel {
      position: fixed;
      top: 72px;
      bottom: 48px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      background: rgba(4, 12, 38, 0.97);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
      transition: transform 0.22s ease;
      pointer-events: none;
    }
    .side-panel.open { pointer-events: auto; }
    .side-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #0d2f7b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 13px;
      flex-shrink: 0;
    }
    .side-panel-header span { flex: 1; font-weight: 600; }
    .plot-window-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: normal;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
      user-select: none;
    }
    .plot-window-control input {
      width: 52px;
      padding: 3px 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      text-align: center;
    }
    .plot-window-control input:focus {
      outline: none;
      border-color: #b8a9d9;
      background: rgba(255, 255, 255, 0.16);
    }
    .side-panel-close {
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .side-panel-tab {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 39;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(13, 47, 123, 0.95);
      color: #fff;
      padding: 10px 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .side-panel.left {
      left: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.35);
      transform: translateX(-100%);
      transition: transform 0.22s ease, left 0.22s ease;
    }
    .side-panel.left.open { transform: translateX(0); }
    .side-panel-tab.left {
      left: 0;
      border-left: none;
      border-radius: 0 8px 8px 0;
    }
    #plots-panel {
      width: clamp(380px, 44vw, 680px);
      min-width: 320px;
      max-width: min(92vw, 900px);
      resize: horizontal;
      overflow: hidden;
      z-index: 42;
    }
    #plots-panel-resize-handle {
      position: absolute;
      top: 0;
      right: 0;
      width: 8px;
      height: 100%;
      cursor: ew-resize;
      z-index: 3;
      touch-action: none;
    }
    #plots-panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      background: #0f1115;
    }
    .plot-section {
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }
    .plot-section:last-child {
      border-bottom: none;
    }
    .plot-section-title {
      margin: 0;
      padding: 10px 12px 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(13, 47, 123, 0.35);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .plot-section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0;
      padding: 10px 12px 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(13, 47, 123, 0.35);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .plot-section-title-row span {
      flex: 1;
    }
    .plot-section-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .plot-section-option input {
      margin: 0;
      cursor: pointer;
    }
    .plot-section canvas {
      width: 100%;
      display: block;
      height: auto;
      min-height: 140px;
    }
    #plots-panel-tab { top: 38%; display: none; }
    #metrics-panel {
      width: clamp(360px, 44vw, 720px);
      z-index: 41;
    }
    #metrics-panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f1115;
    }
    #metrics-frame {
      flex: 1;
      width: 100%;
      min-height: 280px;
      border: 0;
      display: block;
      background: #0f1115;
    }
    #metrics-panel-tab { top: 58%; display: none; }
    #metrics-status {
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      flex-shrink: 0;
    }
    #view {
      width: 100%;
      height: 100%;
      display: block;
      background: #092057;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #replay-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(4, 12, 38, 0.94);
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 13px;
      pointer-events: auto;
    }
    #replay-bar button {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #replay-bar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #replay-play { min-width: 72px; }
    #replay-live.active { background: #2d6a4f; border-color: #95d5b2; }
    #replay-slider {
      flex: 1;
      min-width: 80px;
      cursor: pointer;
      accent-color: #ac61b9;
    }
    #replay-time {
      min-width: 118px;
      font-variant-numeric: tabular-nums;
      opacity: 0.9;
      font-size: 12px;
      white-space: nowrap;
    }
    .replay-speed-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.88);
      white-space: nowrap;
      user-select: none;
    }
    .replay-speed-control input {
      width: 52px;
      padding: 4px 6px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
      text-align: center;
    }
    .replay-speed-control input:focus {
      outline: none;
      border-color: #ac61b9;
      background: rgba(255, 255, 255, 0.16);
    }
    .replay-speed-control input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="topbar">
      <strong>F1TENTH Web Renderer</strong>
      <span id="status">Connecting...</span>
      <div id="controls">
        <button id="toggle-follow" type="button" aria-pressed="false">Free view</button>
        <label><input id="toggle-map" type="checkbox" checked />Show Map</label>
        <label><input id="toggle-history" type="checkbox" />Show position history</label>
        <label><input id="toggle-track-borders" type="checkbox" checked />Show track borders</label>
        <label><input id="toggle-car-info" type="checkbox" />Show car state info</label>
        <button id="toggle-plots" type="button" class="topbar-toggle" aria-pressed="false">Control, state, IMU &amp; reward plots</button>
        <button id="toggle-sac-metrics" type="button" class="topbar-toggle" aria-pressed="false">Training metrics</button>
      </div>
    </div>
    <canvas id="view"></canvas>
  </div>
  <button id="plots-panel-tab" class="side-panel-tab left" type="button" title="Show control, state, IMU and reward plots">Plots</button>
  <aside id="plots-panel" class="side-panel left" aria-label="Control, state, IMU and reward plots" aria-hidden="true">
    <div id="plots-panel-resize-handle" title="Drag to resize panel width"></div>
    <div class="side-panel-header">
      <span>Control, State, IMU &amp; Reward plots</span>
      <label class="plot-window-control" title="Seconds of history shown on each plot">
        Window (s)
        <input id="plot-window-s" type="text" inputmode="decimal" value="50" size="4" aria-label="Plot time window in seconds" />
      </label>
      <button id="plots-panel-close" class="side-panel-close" type="button" title="Collapse panel">Hide</button>
    </div>
    <div id="plots-panel-body">
      <section class="plot-section" id="control-plots-section" aria-label="Control plots">
        <h3 class="plot-section-title">Control</h3>
        <canvas id="control-plot-canvas"></canvas>
      </section>
      <section class="plot-section" id="state-plots-section" aria-label="State plots">
        <h3 class="plot-section-title">State</h3>
        <canvas id="state-plot-canvas"></canvas>
      </section>
      <section class="plot-section" id="imu-plots-section" aria-label="IMU plots">
        <h3 class="plot-section-title">IMU</h3>
        <canvas id="imu-plot-canvas"></canvas>
      </section>
      <section class="plot-section" id="reward-plots-section" aria-label="Reward plots">
        <div class="plot-section-title-row">
          <span>Reward</span>
          <label class="plot-section-option" title="Plot per-episode cumulative sums instead of per-step values">
            <input id="toggle-integrated-rewards" type="checkbox" />
            Integrate components
          </label>
        </div>
        <canvas id="reward-plot-canvas"></canvas>
      </section>
    </div>
  </aside>
  <div id="replay-bar" aria-label="Buffer replay controls">
    <button id="replay-play" type="button" title="Pause live view or play/pause buffer replay">Pause</button>
    <button id="replay-live" type="button" class="active" title="Resume delayed live stream">Live</button>
    <label class="replay-speed-control" title="Replay speed multiplier (1.0 = real-time sim)">
      Speed
      <input id="replay-speed" type="text" inputmode="decimal" value="1.0" size="4" aria-label="Replay speed multiplier" />
      <span>×</span>
    </label>
    <input id="replay-slider" type="range" min="0" max="1000" value="1000" step="1" aria-label="Scrub buffered simulation time" />
    <span id="replay-time">—</span>
  </div>
  <button id="metrics-panel-tab" class="side-panel-tab left" type="button" title="Show SAC training metrics">Metrics</button>
  <aside id="metrics-panel" class="side-panel left" aria-label="SAC training metrics" aria-hidden="true">
    <div class="side-panel-header">
      <span>SAC training metrics</span>
      <button id="metrics-panel-close" class="side-panel-close" type="button" title="Collapse panel">Hide</button>
    </div>
    <div id="metrics-panel-body">
      <div id="metrics-status">Waiting for learner metrics server…</div>
      <iframe id="metrics-frame" title="SAC training metrics" src="about:blank"></iframe>
    </div>
  </aside>
  <script>
    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const plotsPanelEl = document.getElementById("plots-panel");
    const plotsPanelTabEl = document.getElementById("plots-panel-tab");
    const plotsPanelCloseEl = document.getElementById("plots-panel-close");
    const controlPlotCanvas = document.getElementById("control-plot-canvas");
    const statePlotCanvas = document.getElementById("state-plot-canvas");
    const imuPlotCanvas = document.getElementById("imu-plot-canvas");
    const rewardPlotCanvas = document.getElementById("reward-plot-canvas");
    const controlPlotCtx = controlPlotCanvas.getContext("2d");
    const statePlotCtx = statePlotCanvas.getContext("2d");
    const imuPlotCtx = imuPlotCanvas.getContext("2d");
    const rewardPlotCtx = rewardPlotCanvas.getContext("2d");
    const plotsPanelResizeHandleEl = document.getElementById("plots-panel-resize-handle");
    const plotWindowInputEl = document.getElementById("plot-window-s");
    const toggleIntegratedRewardsEl = document.getElementById("toggle-integrated-rewards");
    const statusEl = document.getElementById("status");
    const toggleMapEl = document.getElementById("toggle-map");
    const toggleHistoryEl = document.getElementById("toggle-history");
    const toggleTrackBordersEl = document.getElementById("toggle-track-borders");
    const toggleCarInfoEl = document.getElementById("toggle-car-info");
    const togglePlotsEl = document.getElementById("toggle-plots");
    const toggleSacMetricsEl = document.getElementById("toggle-sac-metrics");
    const metricsPanelEl = document.getElementById("metrics-panel");
    const metricsPanelTabEl = document.getElementById("metrics-panel-tab");
    const metricsPanelCloseEl = document.getElementById("metrics-panel-close");
    const metricsStatusEl = document.getElementById("metrics-status");
    const metricsFrameEl = document.getElementById("metrics-frame");
    let sacMetricsAvailable = false;
    let metricsServerConnected = false;
    let metricsUiConfig = null;
    let plotsPanelOpen = false;
    let metricsPanelOpen = false;
    let replayRecordingEnabled = false;
    let mapMeta = null;
    let mapImg = null;
    let latest = null;
    let latestSimulationTime = 0.0;
    let latestSimAtPoll = 0.0;
    let latestPollWallTimeS = 0.0;
    let prevPollSimTime = null;
    let prevPollWallTimeS = null;
    let simTimeRate = 1.0; // simulated seconds per wall second
    let observedFetchIntervalS = 0.1;
    let lastFetchCompleteWallS = null;
    let lastFrameId = 0;
    let lastIngestedPlotFrameId = 0;
    let staticOverlay = {};
    let frameBuffer = [];
    let experimentArchive = [];
    let experimentArchiveByFrameId = new Map();
    let playbackSimTime = null;
    let bufferPlaybackMode = "live"; // "live" | "manual"
    let manualPlaybackPlaying = false;
    let replayScrubbing = false;
    let replaySpeed = 1.0;
    const REPLAY_SPEED_MIN = 0.1;
    const REPLAY_SPEED_MAX = 20.0;
    let lastDrawWallTimeS = null;
    let cameraFollowEgo = false;
    let cameraCenter = null;
    const LIVE_BUFFER_WINDOW_S = 1.0;
    const REPLAY_BUFFER_WINDOW_S = 2.5;
    const MAX_EXPERIMENT_FRAMES = 24000; // ~8 min at 50 Hz
    const LIVE_TARGET_DELAY_S = 0.15;   // live view: tiny delay for interpolation only
    const REPLAY_TARGET_DELAY_S = 1.5;  // replay/scrub mode
    const LIVE_MIN_BUFFER_DELAY_S = 0.08;
    const REPLAY_MIN_BUFFER_DELAY_S = 1.0;
    const LIVE_POLL_MS = 40;            // ~25 Hz; matches typical control rate better than 10 Hz
    const REPLAY_POLL_MS = 100;
    const HISTORY_POLL_MS = 100; // legacy default; live/replay use getStatePollIntervalMs()
    const REQUEST_OVERLAP_FRAMES = 12;
    const MAX_INFLIGHT_FETCHES = 2;
    let inflightFetches = 0;
    let clientSessionId = null;
    let consecutiveFetchFailures = 0;
    let portDiscoveryInFlight = false;
    const PORT_SCAN_FAILURE_THRESHOLD = 3;
    const PORT_SCAN_RANGE = 25;
    const PORT_PROBE_TIMEOUT_MS = 450;
    let zoom = 60.0; // pixels per meter
    let carLengthM = 0.58;
    let carWidthM = 0.31;
    const ZOOM_MIN = 15.0;
    const ZOOM_MAX = 300.0;
    const ZOOM_FACTOR = 1.15;
    let isDragging = false;
    let dragLastX = 0.0;
    let dragLastY = 0.0;
    let dragMovedPx = 0.0;
    let isPinching = false;
    let pinchStartDist = 0.0;
    let pinchStartZoom = 60.0;
    const DOUBLE_TAP_MS = 350;
    const DOUBLE_TAP_DIST_PX = 28;
    let lastTapTime = 0.0;
    let lastTapX = 0.0;
    let lastTapY = 0.0;
    const viewerId = `viewer-${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
    let showMap = true;
    let showPositionHistory = false;
    let showTrackBorders = true;
    let showCarStateInfo = false;
    let browserPositionHistory = [];
    let browserHistoryLastFrameId = 0;
    const MAX_BROWSER_HISTORY_POINTS = 20000;
    const PLOT_WINDOW_DEFAULT_S = 50.0;
    const PLOT_WINDOW_MIN_S = 0.5;
    const PLOT_WINDOW_MAX_S = 120.0;
    const TIME_SERIES_PLOT_MAX_SAMPLES = 900;
    let plotWindowS = PLOT_WINDOW_DEFAULT_S;
    const CONTROL_ANGULAR_KEY = "0: angular_control";
    const CONTROL_TRANSLATIONAL_KEY = "1: translational_control";
    const STATE_PLOT_COLOR_CYCLE = [
      "rgb(255, 179, 71)",
      "rgb(118, 215, 196)",
      "rgb(186, 154, 255)",
      "rgb(255, 138, 128)",
      "rgb(129, 201, 149)",
      "rgb(138, 180, 248)",
    ];
    const EPISODE_TOTAL_REWARD_KEY = "reward: episode_total";
    const REWARD_PLOT_KEY_ORDER = [
      EPISODE_TOTAL_REWARD_KEY,
      "reward: total",
      "reward: progress",
      "reward: crash_reward",
      "reward: wp_distance_penalty",
      "reward: d_action_penality",
      "reward: speed_cap_penalty",
      "reward: spin_reward",
      "reward: stuck_reward",
    ];
    const STATE_KEY_ORDER = [
      "speed",
      "yaw",
      "distance to raceline",
      "wp_idx",
      "surface friction",
    ];
    const IMU_PLOT_KEY_ORDER = [
      "imu: a_x",
      "imu: a_y",
      "imu: av_z",
      "imu_a_x",
      "imu_a_y",
      "imu_gyro_z",
      "imu1_a_x",
      "imu1_a_y",
      "imu1_av_z",
    ];
    let timeSeriesData = {};
    let controlPlotKeys = [CONTROL_ANGULAR_KEY, CONTROL_TRANSLATIONAL_KEY];
    let statePlotKeys = [];
    let imuPlotKeys = [];
    let rewardPlotKeys = [];
    let episodeTotalPlotEnabled = false;
    let showIntegratedRewardComponents = false;
    let currentEpisodeAccumReward = 0.0;
    let currentEpisodeAccumByKey = {};
    const SUBPLOT_HEIGHT_PX = 128;
    const SUBPLOT_SECTION_PAD_PX = 56;
    let lastControlPlotLayoutKey = "";
    let lastStatePlotLayoutKey = "";
    let lastImuPlotLayoutKey = "";
    let lastRewardPlotLayoutKey = "";
    let controlPlotLayoutCache = null;
    let statePlotLayoutCache = null;
    let imuPlotLayoutCache = null;
    let rewardPlotLayoutCache = null;
    let plotHover = null;
    let plotHoverCanvas = null;

    function isPlotHoverEnabled() {
      return window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    }

    function getPlotWindowS() {
      return plotWindowS;
    }

    function syncPlotWindowInput() {
      if (!plotWindowInputEl) return;
      plotWindowInputEl.value = plotWindowS.toFixed(1);
    }

    function applyPlotWindowFromInput() {
      const parsed = parseNumeric(plotWindowInputEl?.value);
      if (parsed === null) {
        syncPlotWindowInput();
        return;
      }
      plotWindowS = clamp(parsed, PLOT_WINDOW_MIN_S, PLOT_WINDOW_MAX_S);
      syncPlotWindowInput();
      const latestT = Number(latestSimulationTime || 0.0);
      if (latestT > 0) {
        trimTimeSeries(Math.max(0.0, latestT - plotWindowS));
      }
      lastControlPlotLayoutKey = "";
      lastStatePlotLayoutKey = "";
      lastImuPlotLayoutKey = "";
      lastRewardPlotLayoutKey = "";
      plotHover = null;
      plotHoverCanvas = null;
    }

    function controlPlotLayoutKey() {
      return controlPlotKeys.join("|");
    }

    function statePlotLayoutKey() {
      return statePlotKeys.join("|");
    }

    function imuPlotLayoutKey() {
      return imuPlotKeys.join("|");
    }

    function rewardPlotLayoutKey() {
      return rewardPlotKeys.join("|");
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      maybeResizePlotCanvases(true);
    }

    function resizeSectionPlotCanvas(plotCanvas, plotCtx, keys) {
      const subplotCount = Math.max(1, keys.length);
      const layoutHeight = Math.max(
        160,
        subplotCount * SUBPLOT_HEIGHT_PX + SUBPLOT_SECTION_PAD_PX
      );
      plotCanvas.style.height = `${layoutHeight}px`;
      const dpr = window.devicePixelRatio || 1;
      const rect = plotCanvas.getBoundingClientRect();
      plotCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
      plotCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
      plotCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function maybeResizePlotCanvases(force = false) {
      if (!plotsPanelOpen) return;
      const controlKey = controlPlotLayoutKey();
      const stateKey = statePlotLayoutKey();
      const imuKey = imuPlotLayoutKey();
      const rewardKey = rewardPlotLayoutKey();
      const controlChanged = force || controlKey !== lastControlPlotLayoutKey;
      const stateChanged = force || stateKey !== lastStatePlotLayoutKey;
      const imuChanged = force || imuKey !== lastImuPlotLayoutKey;
      const rewardChanged = force || rewardKey !== lastRewardPlotLayoutKey;
      if (controlChanged) {
        lastControlPlotLayoutKey = controlKey;
        resizeSectionPlotCanvas(controlPlotCanvas, controlPlotCtx, controlPlotKeys);
      }
      if (stateChanged) {
        lastStatePlotLayoutKey = stateKey;
        resizeSectionPlotCanvas(statePlotCanvas, statePlotCtx, statePlotKeys);
      }
      if (imuChanged) {
        lastImuPlotLayoutKey = imuKey;
        resizeSectionPlotCanvas(imuPlotCanvas, imuPlotCtx, imuPlotKeys);
      }
      if (rewardChanged) {
        lastRewardPlotLayoutKey = rewardKey;
        resizeSectionPlotCanvas(rewardPlotCanvas, rewardPlotCtx, rewardPlotKeys);
      }
    }

    function startPlotsPanelResize(clientX) {
      const startX = clientX;
      const startWidth = plotsPanelEl.getBoundingClientRect().width;
      const minW = 320;
      const maxW = Math.min(window.innerWidth * 0.92, 900);

      function onMove(ev) {
        const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
        const nextW = clamp(startWidth + (x - startX), minW, maxW);
        plotsPanelEl.style.width = `${nextW}px`;
        updateSidePanelLayout();
        maybeResizePlotCanvases(true);
      }

      function onEnd() {
        window.removeEventListener("mousemove", onMove);
        window.removeEventListener("mouseup", onEnd);
        window.removeEventListener("touchmove", onMove);
        window.removeEventListener("touchend", onEnd);
        window.removeEventListener("touchcancel", onEnd);
      }

      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onEnd);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onEnd);
      window.addEventListener("touchcancel", onEnd);
    }

    function updateSidePanelLayout() {
      if (plotsPanelOpen && metricsPanelOpen) {
        metricsPanelEl.style.left = `${plotsPanelEl.getBoundingClientRect().width}px`;
      } else {
        metricsPanelEl.style.left = "0";
      }
    }

    function updatePlotsPanelChrome() {
      plotsPanelEl.classList.toggle("open", plotsPanelOpen);
      plotsPanelEl.setAttribute("aria-hidden", plotsPanelOpen ? "false" : "true");
      plotsPanelTabEl.style.display = plotsPanelOpen ? "none" : "block";
      togglePlotsEl.classList.toggle("active", plotsPanelOpen);
      togglePlotsEl.setAttribute("aria-pressed", plotsPanelOpen ? "true" : "false");
      togglePlotsEl.textContent = plotsPanelOpen
        ? "Hide control, state, IMU & reward plots"
        : "Control, state, IMU & reward plots";
      updateSidePanelLayout();
    }

    function updateMetricsPanelChrome() {
      metricsPanelEl.classList.toggle("open", metricsPanelOpen);
      metricsPanelEl.setAttribute("aria-hidden", metricsPanelOpen ? "false" : "true");
      metricsPanelTabEl.style.display =
        sacMetricsAvailable && !metricsPanelOpen ? "block" : "none";
      toggleSacMetricsEl.style.display = sacMetricsAvailable ? "inline-block" : "none";
      toggleSacMetricsEl.classList.toggle("active", metricsPanelOpen);
      toggleSacMetricsEl.setAttribute("aria-pressed", metricsPanelOpen ? "true" : "false");
      toggleSacMetricsEl.textContent = metricsPanelOpen
        ? "Hide training metrics"
        : "Training metrics";
      updateSidePanelLayout();
    }

    function setPlotsPanelOpen(open) {
      plotsPanelOpen = !!open;
      updatePlotsPanelChrome();
      if (plotsPanelOpen) maybeResizePlotCanvases(true);
    }

    function setMetricsPanelOpen(open) {
      if (!sacMetricsAvailable) return;
      metricsPanelOpen = !!open;
      updateMetricsPanelChrome();
      if (metricsPanelOpen) ensureMetricsFrameLoaded(true);
    }

    function worldToScreen(x, y, cx, cy) {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      const sx = (x - cx) * zoom + 0.5 * w;
      const sy = h - ((y - cy) * zoom + 0.5 * h);
      return [sx, sy];
    }

    function screenToWorld(sx, sy, cx, cy) {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      const x = cx + (sx - 0.5 * w) / zoom;
      const y = cy + (0.5 * h - sy) / zoom;
      return [x, y];
    }

    function applyZoomAtScreen(factor, sx, sy) {
      if (cameraCenter === null && latest?.poses?.length > 0) {
        const ego = latest.poses[latest.ego_idx || 0];
        cameraCenter = [ego[0], ego[1]];
      }
      if (cameraCenter === null) {
        zoom = clamp(zoom * factor, ZOOM_MIN, ZOOM_MAX);
        return;
      }
      const cx = cameraCenter[0];
      const cy = cameraCenter[1];
      const [wx0, wy0] = screenToWorld(sx, sy, cx, cy);
      const newZoom = clamp(zoom * factor, ZOOM_MIN, ZOOM_MAX);
      if (Math.abs(newZoom - zoom) < 1e-6) return;
      zoom = newZoom;
      const [wx1, wy1] = screenToWorld(sx, sy, cx, cy);
      cameraCenter = [cx + wx0 - wx1, cy + wy0 - wy1];
    }

    function toggleCameraFollow() {
      cameraFollowEgo = !cameraFollowEgo;
      updateFollowButton();
    }

    function updateFollowButton() {
      const btn = document.getElementById("toggle-follow");
      if (!btn) return;
      btn.classList.toggle("active", cameraFollowEgo);
      btn.textContent = cameraFollowEgo ? "Following car" : "Free view";
      btn.setAttribute("aria-pressed", cameraFollowEgo ? "true" : "false");
      btn.title = cameraFollowEgo
        ? "Unlock view (double-tap track)"
        : "Lock view to car (double-tap track)";
    }

    function touchDistance(t0, t1) {
      const dx = t1.clientX - t0.clientX;
      const dy = t1.clientY - t0.clientY;
      return Math.hypot(dx, dy);
    }

    function handleDoubleTap(clientX, clientY) {
      const now = performance.now();
      const dt = now - lastTapTime;
      const dist = Math.hypot(clientX - lastTapX, clientY - lastTapY);
      if (dt > 0 && dt < DOUBLE_TAP_MS && dist < DOUBLE_TAP_DIST_PX) {
        toggleCameraFollow();
        lastTapTime = 0;
        return true;
      }
      lastTapTime = now;
      lastTapX = clientX;
      lastTapY = clientY;
      return false;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function rgb(color, fallback) {
      if (Array.isArray(color) && color.length >= 3) {
        return `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
      }
      return fallback;
    }

    function parseNumeric(value) {
      if (typeof value === "number" && Number.isFinite(value)) return value;
      if (typeof value === "string") {
        const parsed = Number.parseFloat(value);
        if (Number.isFinite(parsed)) return parsed;
      }
      return null;
    }

    function normalizeLabelName(key) {
      const lowered = String(key || "").trim().toLowerCase();
      return lowered.replace(/^\d+\s*:\s*/, "");
    }

    function isControlLabelKey(key) {
      const norm = normalizeLabelName(key);
      return norm.includes("angular_control") || norm.includes("translational_control");
    }

    function resolveControlKey(labels, preferredKey, containsText) {
      if (!labels || typeof labels !== "object") return null;
      if (parseNumeric(labels[preferredKey]) !== null) return preferredKey;
      for (const key of Object.keys(labels)) {
        if (parseNumeric(labels[key]) === null) continue;
        const norm = normalizeLabelName(key);
        if (norm.includes(containsText)) return key;
      }
      return null;
    }

    function isRewardPlotKey(key) {
      const norm = normalizeLabelName(key);
      return norm.startsWith("reward:") || norm === "reward";
    }

    function isImuPlotKey(key) {
      const norm = normalizeLabelName(key);
      if (norm.startsWith("imu:")) return true;
      return (
        norm.startsWith("imu_a_")
        || norm.startsWith("imu_gyro_")
        || norm.startsWith("imu1_a_")
        || norm.startsWith("imu1_av_")
        || norm.startsWith("imu_av_")
      );
    }

    function isEpisodeIntegratedTotalKey(key) {
      return normalizeLabelName(key) === normalizeLabelName(EPISODE_TOTAL_REWARD_KEY);
    }

    function isIntegratableRewardComponentKey(key) {
      if (!isRewardPlotKey(key) || isEpisodeIntegratedTotalKey(key)) return false;
      return true;
    }

    function resetEpisodeRewardAccumulators() {
      currentEpisodeAccumReward = 0.0;
      currentEpisodeAccumByKey = {};
    }

    function clearRewardTimeSeries() {
      for (const key of rewardPlotKeys) {
        delete timeSeriesData[key];
      }
      lastRewardPlotLayoutKey = "";
      plotHover = null;
      if (plotHoverCanvas === rewardPlotCanvas) plotHoverCanvas = null;
    }

    function rewardPlotTitle(key) {
      const title = normalizeLabelName(key);
      if (!showIntegratedRewardComponents || !isIntegratableRewardComponentKey(key)) {
        return title;
      }
      return `${title} (∫ episode)`;
    }

    function sortStatePlotKeys(keys) {
      const rank = (key) => {
        const norm = normalizeLabelName(key);
        if (isRewardPlotKey(key)) {
          const rewardIdx = REWARD_PLOT_KEY_ORDER.findIndex((hint) => norm.includes(normalizeLabelName(hint)));
          const rewardRank = rewardIdx >= 0 ? rewardIdx : REWARD_PLOT_KEY_ORDER.length + 1;
          return 1000 + rewardRank;
        }
        const idx = STATE_KEY_ORDER.findIndex((hint) => norm.includes(hint));
        return idx >= 0 ? idx : STATE_KEY_ORDER.length + 1;
      };
      return [...keys].sort((a, b) => {
        const ra = rank(a);
        const rb = rank(b);
        if (ra !== rb) return ra - rb;
        return normalizeLabelName(a).localeCompare(normalizeLabelName(b));
      });
    }

    function sortImuPlotKeys(keys) {
      const rank = (key) => {
        const norm = normalizeLabelName(key);
        const idx = IMU_PLOT_KEY_ORDER.findIndex((hint) => norm === normalizeLabelName(hint));
        return idx >= 0 ? idx : IMU_PLOT_KEY_ORDER.length + 1;
      };
      return [...keys].sort((a, b) => {
        const ra = rank(a);
        const rb = rank(b);
        if (ra !== rb) return ra - rb;
        return normalizeLabelName(a).localeCompare(normalizeLabelName(b));
      });
    }

    function discoverPlotKeys(labels) {
      const angularKey = resolveControlKey(labels, CONTROL_ANGULAR_KEY, "angular_control");
      const translationalKey = resolveControlKey(labels, CONTROL_TRANSLATIONAL_KEY, "translational_control");
      const nextControlKeys = [angularKey, translationalKey].filter((k) => !!k);
      let nextRewardKeys = sortStatePlotKeys(
        Object.keys(labels).filter(
          (key) => isRewardPlotKey(key) && parseNumeric(labels[key]) !== null
        )
      );
      if (showIntegratedRewardComponents) {
        nextRewardKeys = nextRewardKeys.filter((key) => !isEpisodeIntegratedTotalKey(key));
      } else if (episodeTotalPlotEnabled && !nextRewardKeys.includes(EPISODE_TOTAL_REWARD_KEY)) {
        // Keep episode-integrated total visible in per-step mode after first terminal sample.
        nextRewardKeys.push(EPISODE_TOTAL_REWARD_KEY);
      }

      const nextStateKeys = sortStatePlotKeys(
        Object.keys(labels).filter(
          (key) => (
            !isControlLabelKey(key)
            && !isRewardPlotKey(key)
            && !isImuPlotKey(key)
            && parseNumeric(labels[key]) !== null
          )
        )
      );
      const nextImuKeys = sortImuPlotKeys(
        Object.keys(labels).filter(
          (key) => isImuPlotKey(key) && parseNumeric(labels[key]) !== null
        )
      );
      const controlChanged = controlPlotKeys.join("|") !== nextControlKeys.join("|");
      const stateChanged = statePlotKeys.join("|") !== nextStateKeys.join("|");
      const imuChanged = imuPlotKeys.join("|") !== nextImuKeys.join("|");
      const rewardChanged = rewardPlotKeys.join("|") !== nextRewardKeys.join("|");
      controlPlotKeys = nextControlKeys;
      statePlotKeys = nextStateKeys;
      imuPlotKeys = nextImuKeys;
      rewardPlotKeys = nextRewardKeys;
      for (const key of [...controlPlotKeys, ...statePlotKeys, ...imuPlotKeys, ...rewardPlotKeys]) {
        if (!Array.isArray(timeSeriesData[key])) timeSeriesData[key] = [];
      }
      if (controlChanged) lastControlPlotLayoutKey = "";
      if (stateChanged) lastStatePlotLayoutKey = "";
      if (imuChanged) lastImuPlotLayoutKey = "";
      if (rewardChanged) lastRewardPlotLayoutKey = "";
    }

    function ingestPlotFrame(frame) {
      if (!frame) return;
      const fid = Number(frame.frame_id || 0);
      if (!Number.isFinite(fid) || fid <= lastIngestedPlotFrameId) return;

      const labels = { ...(frame.web_overlay?.label_dict || {}) };
      const timeS = Number(frame.simulation_time || 0.0);
      if (!Number.isFinite(timeS)) return;

      const terminalEpisodeStep =
        !!frame.web_overlay?.force_plot_publish ||
        (() => {
          const stepTotalReward = parseNumeric(labels["reward: total"]);
          return stepTotalReward !== null && stepTotalReward <= -3.0;
        })();

      for (const key of Object.keys(labels)) {
        if (!isIntegratableRewardComponentKey(key)) continue;
        const stepVal = parseNumeric(labels[key]);
        if (stepVal === null) continue;
        currentEpisodeAccumByKey[key] = (currentEpisodeAccumByKey[key] || 0.0) + stepVal;
        if (key === "reward: total") currentEpisodeAccumReward = currentEpisodeAccumByKey[key];
      }

      if (showIntegratedRewardComponents) {
        for (const [key, accum] of Object.entries(currentEpisodeAccumByKey)) {
          labels[key] = accum;
        }
      } else {
        labels[EPISODE_TOTAL_REWARD_KEY] = currentEpisodeAccumReward;
      }

      if (terminalEpisodeStep) {
        episodeTotalPlotEnabled = true;
        resetEpisodeRewardAccumulators();
      }

      discoverPlotKeys(labels);
      const allKeys = [...controlPlotKeys, ...statePlotKeys, ...imuPlotKeys, ...rewardPlotKeys];
      if (allKeys.length === 0) return;

      for (const key of allKeys) {
        const val = parseNumeric(labels[key]);
        if (val === null) continue;
        if (!Array.isArray(timeSeriesData[key])) timeSeriesData[key] = [];
        const series = timeSeriesData[key];
        const last = series.length > 0 ? series[series.length - 1] : null;
        if (last && Math.abs(last[0] - timeS) < 1e-6 && Math.abs(last[1] - val) < 1e-6) {
          continue;
        }
        series.push([timeS, val]);
        if (series.length > TIME_SERIES_PLOT_MAX_SAMPLES) {
          series.splice(0, series.length - TIME_SERIES_PLOT_MAX_SAMPLES);
        }
      }
      trimTimeSeries(Math.max(0.0, timeS - getPlotWindowS()));
      lastIngestedPlotFrameId = Math.max(lastIngestedPlotFrameId, fid);
    }

    function ingestPlotFrames(frames) {
      if (!Array.isArray(frames) || frames.length === 0) return;
      const sorted = [...frames].sort((a, b) => Number(a.frame_id) - Number(b.frame_id));
      for (const frame of sorted) {
        ingestPlotFrame(frame);
      }
    }

    function trimTimeSeries(minTime) {
      for (const key of [...controlPlotKeys, ...statePlotKeys, ...imuPlotKeys, ...rewardPlotKeys]) {
        const series = timeSeriesData[key];
        if (!Array.isArray(series) || series.length === 0) continue;
        let cutIdx = 0;
        while (cutIdx < series.length - 1 && series[cutIdx][0] < minTime) {
          cutIdx += 1;
        }
        if (cutIdx > 0) series.splice(0, cutIdx);
      }
    }

    function updateTimeSeriesPlots(frame) {
      // Plot samples are ingested from raw /state-history frames (by frame_id).
      // Playback interpolation must not be used for reward telemetry.
      if (frame) ingestPlotFrame(frame);
    }

    function plotColorForKey(key, index) {
      if (isControlLabelKey(key)) {
        const norm = normalizeLabelName(key);
        if (norm.includes("angular_control")) return STATE_PLOT_COLOR_CYCLE[0];
        if (norm.includes("translational_control")) return STATE_PLOT_COLOR_CYCLE[1];
      }
      return STATE_PLOT_COLOR_CYCLE[index % STATE_PLOT_COLOR_CYCLE.length];
    }

    function formatPlotValue(v) {
      const av = Math.abs(v);
      if (av >= 100) return v.toFixed(1);
      if (av >= 10) return v.toFixed(2);
      if (av >= 1) return v.toFixed(3);
      return v.toFixed(4);
    }

    function nearestSampleByTime(series, targetT, minT) {
      if (!Array.isArray(series) || series.length === 0) return null;
      let best = null;
      let bestDt = Infinity;
      for (const [t, v] of series) {
        if (t < minT) continue;
        const dt = Math.abs(t - targetT);
        if (dt < bestDt) {
          bestDt = dt;
          best = [t, v];
        }
      }
      return best;
    }

    function plotTimeRangeEnd(keys, fallbackT) {
      let endT = Number(fallbackT || 0.0);
      if (!Number.isFinite(endT)) endT = 0.0;
      const latest = Number(latestSimulationTime || 0.0);
      if (Number.isFinite(latest) && latest > endT) endT = latest;
      for (const key of keys) {
        const series = timeSeriesData[key];
        if (!Array.isArray(series) || series.length === 0) continue;
        const lastT = Number(series[series.length - 1][0]);
        if (Number.isFinite(lastT) && lastT > endT) endT = lastT;
      }
      return endT;
    }

    function computePlotLayout(w, h, allKeys, nowT, titleForKey = null) {
      const padLeft = 54;
      const padRight = 14;
      const padTop = 10;
      const padBottom = 26;
      const plotW = Math.max(1, w - padLeft - padRight);
      const plotH = Math.max(1, h - padTop - padBottom);
      const plotWindow = getPlotWindowS();
      const minT = Math.max(0.0, nowT - plotWindow);
      const subplotGap = 10;
      const subplotCount = Math.max(1, allKeys.length);
      const subplotH = (plotH - subplotGap * (subplotCount - 1)) / subplotCount;
      const subplots = [];
      for (let index = 0; index < allKeys.length; index++) {
        const key = allKeys[index];
        const series = timeSeriesData[key] || [];
        let yMin = Infinity;
        let yMax = -Infinity;
        for (const [t, v] of series) {
          if (t < minT) continue;
          if (v < yMin) yMin = v;
          if (v > yMax) yMax = v;
        }
        if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) {
          yMin = -1.0;
          yMax = 1.0;
        }
        const span = Math.max(1e-3, yMax - yMin);
        const yPad = 0.14 * span;
        const plotMin = yMin - yPad;
        const plotMax = yMax + yPad;
        const plotSpan = Math.max(1e-3, plotMax - plotMin);
        const y0 = padTop + index * (subplotH + subplotGap);
        subplots.push({
          key,
          index,
          title: titleForKey ? titleForKey(key) : normalizeLabelName(key),
          color: plotColorForKey(key, index),
          y0,
          y1: y0 + subplotH,
          subplotH,
          plotMin,
          plotMax,
          plotSpan,
        });
      }
      return { w, h, padLeft, padRight, padTop, padBottom, plotW, plotH, minT, nowT, plotWindow, subplots };
    }

    function seriesPointToScreen(layout, subplot, t, v) {
      const tx = (t - layout.minT) / layout.plotWindow;
      const ty = (v - subplot.plotMin) / subplot.plotSpan;
      const x = layout.padLeft + tx * layout.plotW;
      const y = subplot.y0 + (1.0 - ty) * subplot.subplotH;
      return [x, y];
    }

    function updatePlotHoverFromMouse(clientX, clientY, targetCanvas, layoutCache) {
      if (!plotsPanelOpen || !isPlotHoverEnabled()) {
        plotHover = null;
        plotHoverCanvas = null;
        return;
      }
      const layout = layoutCache;
      if (!layout || layout.subplots.length === 0) {
        plotHover = null;
        plotHoverCanvas = null;
        return;
      }
      const rect = targetCanvas.getBoundingClientRect();
      const mx = clientX - rect.left;
      const my = clientY - rect.top;
      if (mx < layout.padLeft || mx > layout.padLeft + layout.plotW) {
        plotHover = null;
        plotHoverCanvas = null;
        return;
      }
      const hoverT =
        layout.minT + ((mx - layout.padLeft) / layout.plotW) * layout.plotWindow;
      const points = [];
      for (const subplot of layout.subplots) {
        const series = timeSeriesData[subplot.key] || [];
        const nearest = nearestSampleByTime(series, hoverT, layout.minT);
        if (!nearest) continue;
        const [px, py] = seriesPointToScreen(layout, subplot, nearest[0], nearest[1]);
        points.push({
          key: subplot.key,
          title: subplot.title,
          t: nearest[0],
          value: nearest[1],
          color: subplot.color,
          px,
          py,
        });
      }
      if (points.length === 0) {
        plotHover = null;
        plotHoverCanvas = null;
        return;
      }
      const hoverX =
        layout.padLeft +
        ((hoverT - layout.minT) / layout.plotWindow) * layout.plotW;
      plotHover = { t: hoverT, mx, my, hoverX, points };
      plotHoverCanvas = targetCanvas;
    }

    function drawPlotTooltip(lines, mx, my, layout, plotCtx) {
      plotCtx.font = "11px sans-serif";
      const lineH = 14;
      const pad = 8;
      let maxW = 0;
      for (const line of lines) {
        maxW = Math.max(maxW, plotCtx.measureText(line).width);
      }
      const boxW = maxW + pad * 2;
      const boxH = lines.length * lineH + pad * 2;
      let bx = mx + 14;
      let by = my + 14;
      if (bx + boxW > layout.w - 8) bx = mx - boxW - 14;
      if (by + boxH > layout.h - 8) by = my - boxH - 14;
      bx = clamp(bx, 8, layout.w - boxW - 8);
      by = clamp(by, layout.padTop, layout.h - boxH - 8);
      plotCtx.fillStyle = "rgba(8, 16, 42, 0.94)";
      plotCtx.strokeStyle = "rgba(255, 255, 255, 0.38)";
      plotCtx.lineWidth = 1;
      plotCtx.fillRect(bx, by, boxW, boxH);
      plotCtx.strokeRect(bx, by, boxW, boxH);
      plotCtx.fillStyle = "rgba(255, 255, 255, 0.93)";
      lines.forEach((line, i) => {
        plotCtx.fillText(line, bx + pad, by + pad + (i + 1) * lineH - 3);
      });
    }

    function drawPlotHoverOverlay(layout, plotCtx) {
      if (!plotHover || !layout) return;
      const { hoverX, points, t, mx, my } = plotHover;
      plotCtx.save();
      plotCtx.strokeStyle = "rgba(255, 255, 255, 0.42)";
      plotCtx.lineWidth = 1;
      plotCtx.setLineDash([4, 4]);
      plotCtx.beginPath();
      plotCtx.moveTo(hoverX, layout.padTop);
      plotCtx.lineTo(hoverX, layout.h - layout.padBottom);
      plotCtx.stroke();
      plotCtx.setLineDash([]);

      for (const p of points) {
        plotCtx.fillStyle = p.color;
        plotCtx.beginPath();
        plotCtx.arc(p.px, p.py, 5, 0, Math.PI * 2);
        plotCtx.fill();
        plotCtx.strokeStyle = "rgba(255, 255, 255, 0.92)";
        plotCtx.lineWidth = 1.5;
        plotCtx.stroke();
      }

      const lines = [`t = ${t.toFixed(3)} s`];
      for (const p of points) {
        lines.push(`${p.title}: ${formatPlotValue(p.value)}`);
      }
      drawPlotTooltip(lines, mx, my, layout, plotCtx);
      plotCtx.restore();
    }

    function drawSubplotFromLayout(layout, subplot, plotCtx) {
      const { key, title, color, y0, y1, subplotH, plotMin, plotMax, plotSpan } = subplot;
      const series = timeSeriesData[key] || [];
      const minT = layout.minT;
      const { padLeft, plotW } = layout;

      plotCtx.strokeStyle = "rgba(255, 255, 255, 0.22)";
      plotCtx.lineWidth = 1;
      for (let j = 0; j <= 3; j++) {
        const gy = y0 + (j / 3) * subplotH;
        plotCtx.beginPath();
        plotCtx.moveTo(padLeft, gy);
        plotCtx.lineTo(padLeft + plotW, gy);
        plotCtx.stroke();
      }
      plotCtx.beginPath();
      plotCtx.moveTo(padLeft, y0);
      plotCtx.lineTo(padLeft, y1);
      plotCtx.lineTo(padLeft + plotW, y1);
      plotCtx.stroke();

      plotCtx.strokeStyle = color;
      plotCtx.lineWidth = 1.7;
      let drew = false;
      plotCtx.beginPath();
      for (const [t, v] of series) {
        if (t < minT || t > layout.nowT + 1e-6) continue;
        const [x, y] = seriesPointToScreen(layout, subplot, t, v);
        if (!drew) {
          plotCtx.moveTo(x, y);
          drew = true;
        } else {
          plotCtx.lineTo(x, y);
        }
      }
      if (drew) plotCtx.stroke();

      plotCtx.fillStyle = "rgba(255, 255, 255, 0.78)";
      plotCtx.font = "10px sans-serif";
      plotCtx.fillText(plotMax.toFixed(3), 4, y0 + 10);
      plotCtx.fillText(plotMin.toFixed(3), 4, y1 - 2);
      plotCtx.fillStyle = "#e8eaed";
      plotCtx.font = "bold 12px sans-serif";
      plotCtx.fillText(title, padLeft + 6, y0 + 13);
    }

    function drawSectionTimeSeriesPlots(frame, plotCanvas, plotCtx, keys, emptyMessage, section) {
      const rect = plotCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      plotCtx.clearRect(0, 0, w, h);
      plotCtx.fillStyle = "rgba(4, 12, 38, 0.95)";
      plotCtx.fillRect(0, 0, w, h);
      if (keys.length === 0) {
        if (section === "control") controlPlotLayoutCache = null;
        else if (section === "state") statePlotLayoutCache = null;
        else if (section === "imu") imuPlotLayoutCache = null;
        else if (section === "reward") rewardPlotLayoutCache = null;
        if (plotHoverCanvas === plotCanvas) {
          plotHover = null;
          plotHoverCanvas = null;
        }
        plotCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
        plotCtx.font = "12px sans-serif";
        plotCtx.fillText(emptyMessage, 14, 22);
        return;
      }

      // Plot samples are ingested from raw history; playback time lags behind.
      // Anchor the x-axis to the newest ingested sample, not delayed playback time.
      const nowT = plotTimeRangeEnd(
        keys,
        frame ? Number(frame.simulation_time || 0.0) : latestSimulationTime
      );
      const titleForKey = section === "reward" ? rewardPlotTitle : null;
      const layout = computePlotLayout(w, h, keys, nowT, titleForKey);
      if (section === "control") controlPlotLayoutCache = layout;
      else if (section === "state") statePlotLayoutCache = layout;
      else if (section === "imu") imuPlotLayoutCache = layout;
      else if (section === "reward") rewardPlotLayoutCache = layout;

      for (const subplot of layout.subplots) {
        drawSubplotFromLayout(layout, subplot, plotCtx);
      }

      plotCtx.fillStyle = "rgba(255, 255, 255, 0.78)";
      plotCtx.font = "11px sans-serif";
      plotCtx.fillText(`${layout.minT.toFixed(1)}s`, layout.padLeft, h - 8);
      plotCtx.fillText(
        `${layout.nowT.toFixed(1)}s`,
        layout.padLeft + layout.plotW - 36,
        h - 8
      );

      if (isPlotHoverEnabled() && plotHoverCanvas === plotCanvas) {
        drawPlotHoverOverlay(layout, plotCtx);
      }
    }

    function drawTimeSeriesPlots(frame) {
      drawSectionTimeSeriesPlots(
        frame,
        controlPlotCanvas,
        controlPlotCtx,
        controlPlotKeys,
        "Waiting for angular / translational control data...",
        "control"
      );
      drawSectionTimeSeriesPlots(
        frame,
        statePlotCanvas,
        statePlotCtx,
        statePlotKeys,
        "Waiting for state telemetry...",
        "state"
      );
      drawSectionTimeSeriesPlots(
        frame,
        imuPlotCanvas,
        imuPlotCtx,
        imuPlotKeys,
        "Waiting for IMU telemetry (a_x, a_y, av_z)...",
        "imu"
      );
      drawSectionTimeSeriesPlots(
        frame,
        rewardPlotCanvas,
        rewardPlotCtx,
        rewardPlotKeys,
        "Waiting for reward telemetry...",
        "reward"
      );
    }

    function normalizeAngle(a) {
      return Math.atan2(Math.sin(a), Math.cos(a));
    }

    function unwrapAngleToRef(angle, ref) {
      let a = Number(angle);
      const r = Number(ref);
      while (a - r > Math.PI) a -= 2 * Math.PI;
      while (a - r < -Math.PI) a += 2 * Math.PI;
      return a;
    }

    function sanitizeFramePoses(frame) {
      if (!frame || !Array.isArray(frame.poses)) return frame;
      return {
        ...frame,
        poses: frame.poses.map((p) => {
          if (!Array.isArray(p) || p.length < 3) return p;
          return [Number(p[0]), Number(p[1]), normalizeAngle(p[2])];
        }),
      };
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleLerp(a, b, t) {
      const a0 = normalizeAngle(a);
      const b0 = unwrapAngleToRef(b, a0);
      return normalizeAngle(lerp(a0, b0, t));
    }

    function angleDelta(a, b) {
      const a0 = normalizeAngle(a);
      const b0 = unwrapAngleToRef(b, a0);
      return b0 - a0;
    }

    function interpolateState(a, b, t) {
      const overlaySource = t < 0.5 ? (a.web_overlay || {}) : (b.web_overlay || {});
      const poses = [];
      const n = Math.min(a.poses?.length || 0, b.poses?.length || 0);
      for (let i = 0; i < n; i++) {
        const pa = a.poses[i];
        const pb = b.poses[i];
        poses.push([
          lerp(pa[0], pb[0], t),
          lerp(pa[1], pb[1], t),
          angleLerp(pa[2], pb[2], t),
        ]);
      }
      return {
        ego_idx: b.ego_idx ?? a.ego_idx ?? 0,
        simulation_time: lerp(a.simulation_time || 0.0, b.simulation_time || 0.0, t),
        poses: poses,
        web_overlay: overlaySource,
      };
    }

    function extrapolateState(prev, last, targetTime) {
      if (!prev || !last) return last;
      const dt = Math.max(1e-6, last.simulation_time - prev.simulation_time);
      const extra = Math.max(0.0, targetTime - last.simulation_time);
      // Short extrapolation only; beyond this we prefer holding last sample.
      const extraClamped = Math.min(extra, 0.15);

      const poses = [];
      const n = Math.min(prev.poses?.length || 0, last.poses?.length || 0);
      for (let i = 0; i < n; i++) {
        const p0 = prev.poses[i];
        const p1 = last.poses[i];
        const vx = (p1[0] - p0[0]) / dt;
        const vy = (p1[1] - p0[1]) / dt;
        const w = angleDelta(p0[2], p1[2]) / dt;
        poses.push([
          p1[0] + vx * extraClamped,
          p1[1] + vy * extraClamped,
          normalizeAngle(p1[2] + w * extraClamped),
        ]);
      }
      return {
        ego_idx: last.ego_idx ?? 0,
        simulation_time: last.simulation_time + extraClamped,
        poses: poses,
        web_overlay: last.web_overlay || {},
      };
    }

    function getExperimentTimeRange() {
      const archiveEnd = experimentArchive.length > 0
        ? Number(experimentArchive[experimentArchive.length - 1].simulation_time)
        : 0.0;
      const end = Math.max(archiveEnd, Number(latestSimulationTime || 0.0));
      if (end <= 0.0 && experimentArchive.length === 0) return null;
      const start = experimentArchive.length > 0
        ? Number(experimentArchive[0].simulation_time)
        : 0.0;
      return { start, end };
    }

    function mergeIntoExperimentArchive(samples) {
      if (!Array.isArray(samples) || samples.length === 0) return;
      for (const s of samples) {
        if (!s || !Number.isFinite(s.simulation_time) || !Number.isFinite(s.frame_id)) continue;
        const fid = Number(s.frame_id);
        const existing = experimentArchiveByFrameId.get(fid);
        if (!existing || Number(s.simulation_time) >= Number(existing.simulation_time)) {
          experimentArchiveByFrameId.set(fid, sanitizeFramePoses(s));
        }
      }
      if (experimentArchiveByFrameId.size > MAX_EXPERIMENT_FRAMES) {
        const sortedIds = Array.from(experimentArchiveByFrameId.keys()).sort((a, b) => a - b);
        const dropCount = sortedIds.length - MAX_EXPERIMENT_FRAMES;
        for (let i = 0; i < dropCount; i++) {
          experimentArchiveByFrameId.delete(sortedIds[i]);
        }
      }
      experimentArchive = Array.from(experimentArchiveByFrameId.values()).sort((a, b) => {
        const ta = Number(a.simulation_time);
        const tb = Number(b.simulation_time);
        if (Math.abs(ta - tb) > 1e-9) return ta - tb;
        return Number(a.frame_id) - Number(b.frame_id);
      });
    }

    function stateAtExperimentTime(target) {
      if (experimentArchive.length === 0) return null;
      if (experimentArchive.length === 1) return experimentArchive[0];
      if (target <= experimentArchive[0].simulation_time) return experimentArchive[0];

      for (let i = 1; i < experimentArchive.length; i++) {
        const a = experimentArchive[i - 1];
        const b = experimentArchive[i];
        if (target <= b.simulation_time) {
          const dt = Math.max(1e-6, b.simulation_time - a.simulation_time);
          const t = Math.max(0.0, Math.min(1.0, (target - a.simulation_time) / dt));
          return interpolateState(a, b, t);
        }
      }
      const last = experimentArchive[experimentArchive.length - 1];
      return sanitizeFramePoses(last);
    }

    function getLiveBufferWindowS() {
      return replayRecordingEnabled ? REPLAY_BUFFER_WINDOW_S : LIVE_BUFFER_WINDOW_S;
    }

    function getTargetBufferDelayS() {
      return replayRecordingEnabled ? REPLAY_TARGET_DELAY_S : LIVE_TARGET_DELAY_S;
    }

    function getMinBufferDelayS() {
      return replayRecordingEnabled ? REPLAY_MIN_BUFFER_DELAY_S : LIVE_MIN_BUFFER_DELAY_S;
    }

    function getStatePollIntervalMs() {
      return replayRecordingEnabled ? REPLAY_POLL_MS : LIVE_POLL_MS;
    }

    function syncLivePlaybackTime(nowS) {
      if (frameBuffer.length === 0) return;
      const oldestT = frameBuffer[0].simulation_time;
      const newestT = frameBuffer[frameBuffer.length - 1].simulation_time;
      const targetDelay = getTargetBufferDelayS();
      const minHorizon = getMinBufferDelayS();
      if (playbackSimTime === null) {
        playbackSimTime = newestT - targetDelay;
        if (playbackSimTime < oldestT) playbackSimTime = oldestT;
        lastDrawWallTimeS = nowS;
        return;
      }
      const dtWall = Math.max(0.0, Math.min(0.1, nowS - (lastDrawWallTimeS ?? nowS)));
      lastDrawWallTimeS = nowS;
      const currentHorizon = newestT - playbackSimTime;
      const horizonError = currentHorizon - targetDelay;
      const correction = Math.max(-0.08, Math.min(0.08, 0.04 * horizonError));
      const playbackRate = Math.max(0.2, simTimeRate * (1.0 + correction));
      if (currentHorizon > minHorizon) {
        playbackSimTime += dtWall * playbackRate;
      }
      playbackSimTime = Math.max(playbackSimTime, oldestT);
      playbackSimTime = Math.min(playbackSimTime, newestT);
    }

    function stateFromLiveBuffer(target) {
      if (frameBuffer.length === 0) return null;
      if (frameBuffer.length === 1) return sanitizeFramePoses(frameBuffer[0]);
      const newestT = frameBuffer[frameBuffer.length - 1].simulation_time;
      const clampedTarget = Math.max(
        frameBuffer[0].simulation_time,
        Math.min(target, newestT)
      );
      if (clampedTarget <= frameBuffer[0].simulation_time) {
        return sanitizeFramePoses(frameBuffer[0]);
      }
      for (let i = 1; i < frameBuffer.length; i++) {
        const a = frameBuffer[i - 1];
        const b = frameBuffer[i];
        if (clampedTarget <= b.simulation_time) {
          const dt = Math.max(1e-6, b.simulation_time - a.simulation_time);
          const t = Math.max(0.0, Math.min(1.0, (clampedTarget - a.simulation_time) / dt));
          return interpolateState(a, b, t);
        }
      }
      return sanitizeFramePoses(frameBuffer[frameBuffer.length - 1]);
    }

    function simTimeFromSliderValue(sliderValue) {
      const range = getExperimentTimeRange();
      if (!range) return 0.0;
      const span = Math.max(1e-6, range.end - range.start);
      const frac = clamp(Number(sliderValue) / 1000.0, 0.0, 1.0);
      return range.start + frac * span;
    }

    function sliderValueFromSimTime(simTime) {
      const range = getExperimentTimeRange();
      if (!range) return 1000;
      const span = Math.max(1e-6, range.end - range.start);
      const frac = clamp((Number(simTime) - range.start) / span, 0.0, 1.0);
      return Math.round(frac * 1000);
    }

    function syncReplaySpeedInput() {
      const el = document.getElementById("replay-speed");
      if (!el) return;
      el.value = replaySpeed.toFixed(1);
      el.disabled = bufferPlaybackMode === "live";
    }

    function applyReplaySpeedFromInput() {
      const el = document.getElementById("replay-speed");
      const parsed = parseNumeric(el?.value);
      if (parsed === null) {
        syncReplaySpeedInput();
        return;
      }
      replaySpeed = clamp(parsed, REPLAY_SPEED_MIN, REPLAY_SPEED_MAX);
      syncReplaySpeedInput();
    }

    function getReplaySpeed() {
      return clamp(replaySpeed, REPLAY_SPEED_MIN, REPLAY_SPEED_MAX);
    }

    function updateReplayPlayButton() {
      const btn = document.getElementById("replay-play");
      if (!btn) return;
      if (bufferPlaybackMode === "live") {
        btn.textContent = "Pause";
        btn.title = "Pause live view and scrub the buffer";
      } else if (manualPlaybackPlaying) {
        btn.textContent = "Pause";
        btn.title = "Pause buffer replay";
      } else {
        btn.textContent = "Play";
        btn.title = "Play buffer replay";
      }
    }

    function updateReplayBarUI() {
      const sliderEl = document.getElementById("replay-slider");
      const timeEl = document.getElementById("replay-time");
      const liveBtn = document.getElementById("replay-live");
      const range = getExperimentTimeRange();
      if (!sliderEl || !timeEl || !range) {
        if (timeEl) timeEl.textContent = "—";
        if (sliderEl) sliderEl.disabled = true;
        return;
      }
      sliderEl.disabled = range.end <= range.start;
      if (!replayScrubbing) {
        if (bufferPlaybackMode === "live") {
          sliderEl.value = "1000";
        } else {
          const t = playbackSimTime ?? range.end;
          sliderEl.value = String(sliderValueFromSimTime(t));
        }
      }
      const shownT = bufferPlaybackMode === "live"
        ? range.end
        : (playbackSimTime ?? range.end);
      const modeLabel = bufferPlaybackMode === "live" ? "live" : (manualPlaybackPlaying ? "replay" : "paused");
      timeEl.textContent = `${shownT.toFixed(2)}s / ${range.end.toFixed(2)}s (${modeLabel})`;
      if (liveBtn) liveBtn.classList.toggle("active", bufferPlaybackMode === "live");
      syncReplaySpeedInput();
      updateReplayPlayButton();
    }

    function enterManualPlayback() {
      bufferPlaybackMode = "manual";
      manualPlaybackPlaying = false;
      if (playbackSimTime === null) {
        const range = getExperimentTimeRange();
        playbackSimTime = range ? range.end : 0.0;
      }
      lastDrawWallTimeS = performance.now() / 1000.0;
      updateReplayBarUI();
    }

    function goLivePlayback() {
      bufferPlaybackMode = "live";
      manualPlaybackPlaying = false;
      replayScrubbing = false;
      playbackSimTime = null;
      lastDrawWallTimeS = null;
      updateReplayBarUI();
    }

    function toggleReplayPlayPause() {
      const range = getExperimentTimeRange();
      if (!range || range.end <= range.start) return;
      if (bufferPlaybackMode === "live") {
        syncLivePlaybackTime(performance.now() / 1000.0);
        enterManualPlayback();
        return;
      }
      manualPlaybackPlaying = !manualPlaybackPlaying;
      lastDrawWallTimeS = performance.now() / 1000.0;
      updateReplayBarUI();
    }

    function stateForRender() {
      const nowS = performance.now() / 1000.0;

      if (replayRecordingEnabled && bufferPlaybackMode === "manual") {
        const range = getExperimentTimeRange();
        if (!range) return null;
        if (playbackSimTime === null) playbackSimTime = range.end;
        const dtWall = Math.max(0.0, Math.min(0.1, nowS - (lastDrawWallTimeS ?? nowS)));
        lastDrawWallTimeS = nowS;
        if (manualPlaybackPlaying) {
          playbackSimTime += dtWall * getReplaySpeed();
          if (playbackSimTime >= range.end) {
            playbackSimTime = range.end;
            manualPlaybackPlaying = false;
          }
        }
        playbackSimTime = Math.max(playbackSimTime, range.start);
        playbackSimTime = Math.min(playbackSimTime, range.end);
        const archived = stateAtExperimentTime(playbackSimTime);
        if (archived) return archived;
        return stateFromLiveBuffer(playbackSimTime);
      }

      if (frameBuffer.length === 0) return null;
      syncLivePlaybackTime(nowS);
      return stateFromLiveBuffer(playbackSimTime);
    }

    function drawPoints(points, color, radius, cx, cy) {
      if (!Array.isArray(points)) return;
      ctx.fillStyle = color;
      for (const p of points) {
        if (!Array.isArray(p) || p.length < 2) continue;
        const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSinglePoint(pointList, color, radius, cx, cy) {
      if (!Array.isArray(pointList) || pointList.length === 0) return;
      const p = pointList[0];
      if (!Array.isArray(p) || p.length < 2) return;
      const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawVirtualOpponents(poses, color, cx, cy, size) {
      if (!Array.isArray(poses)) return;
      const widthM = Array.isArray(size) && size.length >= 1 && Number.isFinite(size[0])
        ? size[0] : carWidthM;
      const lengthM = Array.isArray(size) && size.length >= 2 && Number.isFinite(size[1])
        ? size[1] : carLengthM;
      for (const p of poses) {
        if (!Array.isArray(p) || p.length < 3) continue;
        const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
        const heading = p[2];
        const carLen = lengthM * zoom;
        const carWid = widthM * zoom;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(-heading);
        ctx.fillStyle = color;
        ctx.fillRect(-carLen / 2, -carWid / 2, carLen, carWid);
        ctx.restore();
      }
    }

    function drawLine(points, color, lineWidth, cx, cy) {
      if (!Array.isArray(points) || points.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      points.forEach((p, idx) => {
        if (!Array.isArray(p) || p.length < 2) return;
        const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
        if (idx === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      });
      ctx.stroke();
    }

    function drawTrajectories(trajectories, color, radius, cx, cy) {
      if (!Array.isArray(trajectories)) return;
      ctx.fillStyle = color;
      for (const traj of trajectories) {
        if (!Array.isArray(traj)) continue;
        for (const p of traj) {
          if (!Array.isArray(p) || p.length < 2) continue;
          const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
          ctx.beginPath();
          ctx.arc(sx, sy, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function applyReplayRecordingUi() {
      const replayBarEl = document.getElementById("replay-bar");
      if (replayBarEl) {
        replayBarEl.style.display = replayRecordingEnabled ? "" : "none";
      }
    }

    async function loadUiConfig() {
      try {
        const r = await fetch("/ui-config", { cache: "no-store" });
        if (!r.ok) return;
        const cfg = await r.json();
        metricsUiConfig = cfg;
        if (Number.isFinite(cfg.car_length)) carLengthM = cfg.car_length;
        if (Number.isFinite(cfg.car_width)) carWidthM = cfg.car_width;
        if (typeof cfg.replay_recording_enabled === "boolean") {
          replayRecordingEnabled = cfg.replay_recording_enabled;
          applyReplayRecordingUi();
          startStatePolling();
        }
      } catch (e) {
        // Keep defaults when ui-config is unavailable.
      }
    }

    async function loadMap() {
      try {
        const r = await fetch("/map");
        mapMeta = await r.json();
        mapImg = new Image();
        mapImg.src = "/map-image";
      } catch (e) {
        console.error(e);
      }
    }

    async function loadStaticOverlay() {
      try {
        const r = await fetch("/overlay-static");
        staticOverlay = await r.json();
      } catch (e) {
        // Keep last static overlay on errors.
      }
    }

    function metricsDashboardUrl(port) {
      const host = window.location.hostname || "127.0.0.1";
      return `http://${host}:${port}/`;
    }

    function metricsBaseUrl(port) {
      return metricsDashboardUrl(port).replace(/\/$/, "");
    }

    function ensureMetricsFrameLoaded(force = false) {
      if (!sacMetricsAvailable || !metricsUiConfig) return;
      const port = Number(metricsUiConfig.metrics_port) || 5556;
      const base = metricsBaseUrl(port);
      const currentSrc = metricsFrameEl.getAttribute("src") || "";
      if (!force && metricsServerConnected && currentSrc.startsWith(base)) return;
      if (!metricsServerConnected && !force) return;
      metricsFrameEl.src = `${base}/?_=${Date.now()}`;
    }

    async function pollTelemetry() {
      try {
        const r = await fetch("/ui-config", { cache: "no-store" });
        if (!r.ok) return;
        const cfg = await r.json();
        metricsUiConfig = cfg;

        if (cfg.show_sac_metrics && !sacMetricsAvailable) {
          sacMetricsAvailable = true;
          updateMetricsPanelChrome();
          if (cfg.metrics_panel_open_default) {
            setMetricsPanelOpen(true);
          }
        }

        if (!cfg.show_sac_metrics) {
          return;
        }

        const port = Number(cfg.metrics_port) || 5556;
        const healthUrl = `${metricsBaseUrl(port)}/api/health`;
        try {
          const hr = await fetch(healthUrl, { cache: "no-store", mode: "cors" });
          if (!hr.ok) {
            metricsServerConnected = false;
            metricsStatusEl.textContent = "Waiting for learner metrics server…";
            return;
          }
          const wasConnected = metricsServerConnected;
          metricsServerConnected = true;
          metricsStatusEl.textContent = "Metrics live";
          if (!wasConnected || metricsPanelOpen) {
            ensureMetricsFrameLoaded(!wasConnected);
          }
        } catch (e) {
          metricsServerConnected = false;
          metricsStatusEl.textContent = "Waiting for learner metrics server…";
        }
      } catch (e) {
        // Renderer ui-config unavailable; retry on next poll.
      }
    }

    async function fetchArchiveBackfillTick() {
      if (!replayRecordingEnabled) return;
      if (inflightFetches >= MAX_INFLIGHT_FETCHES) return;
      if (experimentArchive.length === 0) return;
      const oldestFrameId = Number(experimentArchive[0].frame_id);
      if (oldestFrameId <= 1) return;

      inflightFetches += 1;
      try {
        const since = Math.max(0, oldestFrameId - 201);
        const r = await fetch(`/state-history?since=${since}`);
        const payload = await r.json();
        const history = Array.isArray(payload.history) ? payload.history : [];
        mergeIntoExperimentArchive(history);
      } catch (e) {
        // Best-effort backfill; regular polling continues.
      } finally {
        inflightFetches = Math.max(0, inflightFetches - 1);
        const nextOldest = experimentArchive.length > 0 ? Number(experimentArchive[0].frame_id) : 1;
        if (nextOldest > 1 && inflightFetches < MAX_INFLIGHT_FETCHES) {
          fetchArchiveBackfillTick();
        }
      }
    }

    function scheduleArchiveBackfill() {
      if (inflightFetches >= MAX_INFLIGHT_FETCHES) return;
      if (experimentArchive.length === 0) return;
      if (Number(experimentArchive[0].frame_id) <= 1) return;
      fetchArchiveBackfillTick();
    }

    function getRendererPortScanBase() {
      const cfgPort = Number(metricsUiConfig?.web_render_port);
      if (Number.isFinite(cfgPort) && cfgPort > 0) return cfgPort;
      const currentPort = Number(window.location.port);
      if (Number.isFinite(currentPort) && currentPort > 0) return currentPort;
      return 8765;
    }

    function handleServerSessionChange(serverSessionId) {
      if (serverSessionId === null) return false;
      if (clientSessionId === null) {
        clientSessionId = serverSessionId;
        return false;
      }
      if (serverSessionId === clientSessionId) return false;

      frameBuffer = [];
      experimentArchive = [];
      experimentArchiveByFrameId = new Map();
      latest = null;
      latestSimulationTime = 0.0;
      latestSimAtPoll = 0.0;
      latestPollWallTimeS = 0.0;
      prevPollSimTime = null;
      prevPollWallTimeS = null;
      simTimeRate = 1.0;
      observedFetchIntervalS = 0.1;
      lastFetchCompleteWallS = null;
      lastFrameId = 0;
      lastIngestedPlotFrameId = 0;
      timeSeriesData = {};
      playbackSimTime = null;
      bufferPlaybackMode = "live";
      manualPlaybackPlaying = false;
      replayScrubbing = false;
      lastDrawWallTimeS = null;
      browserPositionHistory = [];
      browserHistoryLastFrameId = 0;
      clientSessionId = serverSessionId;
      loadMap();
      loadStaticOverlay();
      statusEl.textContent = "Detected new experiment backend. Reconnected.";
      return true;
    }

    function noteFetchSuccess() {
      consecutiveFetchFailures = 0;
    }

    function noteFetchFailure() {
      consecutiveFetchFailures += 1;
      statusEl.textContent = "Waiting for simulation state...";
      if (consecutiveFetchFailures >= PORT_SCAN_FAILURE_THRESHOLD && !portDiscoveryInFlight) {
        portDiscoveryInFlight = true;
        tryDiscoverRendererPort().finally(() => {
          portDiscoveryInFlight = false;
        });
      }
    }

    async function tryDiscoverRendererPort() {
      const host = window.location.hostname || "127.0.0.1";
      const currentPort = Number(window.location.port) || getRendererPortScanBase();
      const basePort = getRendererPortScanBase();
      for (let offset = 0; offset < PORT_SCAN_RANGE; offset += 1) {
        const port = basePort + offset;
        if (port === currentPort) continue;
        const probeUrl = `http://${host}:${port}/viewer-heartbeat?viewer_id=${encodeURIComponent(viewerId)}`;
        try {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), PORT_PROBE_TIMEOUT_MS);
          const r = await fetch(probeUrl, { cache: "no-store", signal: controller.signal });
          clearTimeout(timer);
          if (!r.ok) continue;
          const payload = await r.json();
          if (!payload || payload.ok !== true) continue;
          const target = `http://${host}:${port}/`;
          if (window.location.href !== target) {
            window.location.replace(target);
          }
          return true;
        } catch (e) {
          // Try the next candidate port.
        }
      }
      return false;
    }

    async function fetchStateTick() {
      if (inflightFetches >= MAX_INFLIGHT_FETCHES) {
        return;
      }
      inflightFetches += 1;
      try {
        const r = await fetch("/state", { cache: "no-store" });
        const state = await r.json();
        noteFetchSuccess();
        if (typeof state.replay_recording_enabled === "boolean") {
          if (state.replay_recording_enabled !== replayRecordingEnabled) {
            replayRecordingEnabled = state.replay_recording_enabled;
            applyReplayRecordingUi();
            startStatePolling();
            return;
          }
        }
        handleServerSessionChange(state.session_id || null);
        const frameId = Number(state.frame_id || 0);
        if (!Number.isFinite(frameId) || frameId <= lastFrameId) {
          return;
        }
        const history = [state];
        const payload = {
          history,
          latest_simulation_time: Number(state.simulation_time || 0.0),
          latest_frame_id: frameId,
          session_id: state.session_id || null,
          replay_recording_enabled: replayRecordingEnabled,
        };
        await processStatePollPayload(payload, history);
      } catch (e) {
        noteFetchFailure();
      } finally {
        const now = performance.now() / 1000.0;
        if (lastFetchCompleteWallS !== null) {
          const interval = Math.max(0.01, now - lastFetchCompleteWallS);
          observedFetchIntervalS = 0.8 * observedFetchIntervalS + 0.2 * interval;
        }
        lastFetchCompleteWallS = now;
        inflightFetches = Math.max(0, inflightFetches - 1);
      }
    }

    async function processStatePollPayload(payload, history) {
      const serverSessionId = payload.session_id || null;
      if (typeof payload.replay_recording_enabled === "boolean") {
        replayRecordingEnabled = payload.replay_recording_enabled;
        applyReplayRecordingUi();
      }
      const incomingLatestFrameId = Number(payload.latest_frame_id || 0);
      handleServerSessionChange(serverSessionId);
      appendHistorySamples(history);
      if (incomingLatestFrameId + REQUEST_OVERLAP_FRAMES < lastFrameId) {
        return;
      }
      const newLatestSimulationTime = Number(payload.latest_simulation_time || 0.0);
      const nowWall = performance.now() / 1000.0;
      if (prevPollSimTime !== null && prevPollWallTimeS !== null) {
        const dSim = newLatestSimulationTime - prevPollSimTime;
        const dWall = Math.max(1e-6, nowWall - prevPollWallTimeS);
        const instRate = Math.max(0.1, Math.min(50.0, dSim / dWall));
        simTimeRate = 0.8 * simTimeRate + 0.2 * instRate;
      }
      prevPollSimTime = newLatestSimulationTime;
      prevPollWallTimeS = nowWall;
      latestSimulationTime = newLatestSimulationTime;
      lastFrameId = Math.max(lastFrameId, incomingLatestFrameId);
      latestSimAtPoll = latestSimulationTime;
      latestPollWallTimeS = nowWall;

      if (replayRecordingEnabled) {
        mergeIntoExperimentArchive(history);
        scheduleArchiveBackfill();
      }

      const cutoff = latestSimulationTime - getLiveBufferWindowS();
      const mergedByFrameId = new Map();
      for (const s of [...frameBuffer, ...history]) {
        if (!s || !Number.isFinite(s.simulation_time) || !Number.isFinite(s.frame_id)) continue;
        if (s.simulation_time < cutoff) continue;
        const fid = Number(s.frame_id);
        const existing = mergedByFrameId.get(fid);
        if (!existing || s.simulation_time >= existing.simulation_time) {
          mergedByFrameId.set(fid, s);
        }
      }

      const merged = Array.from(mergedByFrameId.values()).sort((a, b) => {
        const ta = Number(a.simulation_time);
        const tb = Number(b.simulation_time);
        if (Math.abs(ta - tb) > 1e-9) return ta - tb;
        return Number(a.frame_id) - Number(b.frame_id);
      });

      const monotonic = [];
      let lastT = -Infinity;
      for (const s of merged) {
        const t = Number(s.simulation_time);
        if (t + 1e-9 >= lastT) {
          monotonic.push(s);
          lastT = t;
        }
      }
      frameBuffer = monotonic;
      latest = frameBuffer.length > 0 ? frameBuffer[frameBuffer.length - 1] : null;
      ingestPlotFrames(history);

      const labels = latest?.web_overlay?.label_dict || {};
      const labelText = showCarStateInfo && Object.keys(labels).length > 0
        ? " | " + Object.entries(labels).map(([k, v]) => `${k}: ${v}`).join(" | ")
        : "";
      const camMode = cameraFollowEgo ? "follow-car" : "free";
      statusEl.textContent = `Sim time: ${(latestSimulationTime || 0).toFixed(2)} s | cars: ${(latest?.poses?.length || 0)} | cam: ${camMode} | zoom: ${zoom.toFixed(1)}${labelText}`;
      if (replayRecordingEnabled) {
        updateReplayBarUI();
      }
    }

    async function fetchStateHistoryTick() {
      if (inflightFetches >= MAX_INFLIGHT_FETCHES) {
        return;
      }
      inflightFetches += 1;
      try {
        const since = Math.max(0, lastFrameId - REQUEST_OVERLAP_FRAMES);
        const r = await fetch(`/state-history?since=${since}`);
        const payload = await r.json();
        noteFetchSuccess();
        const history = Array.isArray(payload.history) ? payload.history : [];
        if (typeof payload.replay_recording_enabled === "boolean") {
          if (payload.replay_recording_enabled !== replayRecordingEnabled) {
            replayRecordingEnabled = payload.replay_recording_enabled;
            applyReplayRecordingUi();
            startStatePolling();
            return;
          }
        }
        await processStatePollPayload(payload, history);
      } catch (e) {
        noteFetchFailure();
      } finally {
        const now = performance.now() / 1000.0;
        if (lastFetchCompleteWallS !== null) {
          const interval = Math.max(0.01, now - lastFetchCompleteWallS);
          observedFetchIntervalS = 0.8 * observedFetchIntervalS + 0.2 * interval;
        }
        lastFetchCompleteWallS = now;
        inflightFetches = Math.max(0, inflightFetches - 1);
      }
    }

    let statePollTimer = null;
