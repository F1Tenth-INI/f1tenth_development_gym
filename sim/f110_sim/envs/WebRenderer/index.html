<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1TENTH Web Renderer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #091f56; color: #fff; font-family: sans-serif; }
    #root { display: grid; grid-template-rows: 72px 1fr; height: 100%; }
    #topbar { display: flex; align-items: center; gap: 16px; padding: 0 12px; background: #0d2f7b; }
    #status { font-size: 14px; opacity: 0.95; white-space: pre-line; }
    #controls { display: flex; align-items: center; gap: 14px; margin-left: auto; font-size: 13px; }
    #controls label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    #controls { flex-wrap: wrap; }
    #toggle-follow {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #toggle-follow.active { background: #ac61b9; border-color: #d9b3e8; }
    .topbar-toggle {
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #toggle-plots.active { background: #5c4d7a; border-color: #b8a9d9; }
    #toggle-sac-metrics {
      display: none;
    }
    #toggle-sac-metrics.active { background: #2d6a4f; border-color: #95d5b2; }
    .side-panel {
      position: fixed;
      top: 72px;
      bottom: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      background: rgba(4, 12, 38, 0.97);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
      transition: transform 0.22s ease;
      pointer-events: none;
    }
    .side-panel.open { pointer-events: auto; }
    .side-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #0d2f7b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 13px;
      flex-shrink: 0;
    }
    .side-panel-header span { flex: 1; font-weight: 600; }
    .side-panel-close {
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .side-panel-tab {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 39;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(13, 47, 123, 0.95);
      color: #fff;
      padding: 10px 8px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .side-panel.left {
      left: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.35);
      transform: translateX(-100%);
      transition: transform 0.22s ease, left 0.22s ease;
    }
    .side-panel.left.open { transform: translateX(0); }
    .side-panel-tab.left {
      left: 0;
      border-left: none;
      border-radius: 0 8px 8px 0;
    }
    #plots-panel {
      width: clamp(320px, 40vw, 520px);
      z-index: 42;
    }
    #plots-panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      background: #0f1115;
    }
    #plot-canvas {
      width: 100%;
      display: block;
      height: auto;
      min-height: 200px;
    }
    #plots-panel-tab { top: 38%; display: none; }
    #metrics-panel {
      width: clamp(360px, 44vw, 720px);
      z-index: 41;
    }
    #metrics-panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f1115;
    }
    #metrics-frame {
      flex: 1;
      width: 100%;
      min-height: 280px;
      border: 0;
      display: block;
      background: #0f1115;
    }
    #metrics-panel-tab { top: 58%; display: none; }
    #metrics-status {
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      flex-shrink: 0;
    }
    #view {
      width: 100%;
      height: 100%;
      display: block;
      background: #092057;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="topbar">
      <strong>F1TENTH Web Renderer</strong>
      <span id="status">Connecting...</span>
      <div id="controls">
        <button id="toggle-follow" type="button" class="active" aria-pressed="true">Following car</button>
        <label><input id="toggle-map" type="checkbox" checked />Show Map</label>
        <label><input id="toggle-history" type="checkbox" />Show position history</label>
        <label><input id="toggle-track-borders" type="checkbox" checked />Show track borders</label>
        <label><input id="toggle-car-info" type="checkbox" />Show car state info</label>
        <button id="toggle-plots" type="button" class="topbar-toggle active" aria-pressed="true">Control &amp; state plots</button>
        <button id="toggle-sac-metrics" type="button" class="topbar-toggle" aria-pressed="false">Training metrics</button>
      </div>
    </div>
    <canvas id="view"></canvas>
  </div>
  <button id="plots-panel-tab" class="side-panel-tab left" type="button" title="Show control and state plots">Plots</button>
  <aside id="plots-panel" class="side-panel left open" aria-label="Control and state plots" aria-hidden="false">
    <div class="side-panel-header">
      <span>Control &amp; state plots</span>
      <button id="plots-panel-close" class="side-panel-close" type="button" title="Collapse panel">Hide</button>
    </div>
    <div id="plots-panel-body">
      <canvas id="plot-canvas"></canvas>
    </div>
  </aside>
  <button id="metrics-panel-tab" class="side-panel-tab left" type="button" title="Show SAC training metrics">Metrics</button>
  <aside id="metrics-panel" class="side-panel left" aria-label="SAC training metrics" aria-hidden="true">
    <div class="side-panel-header">
      <span>SAC training metrics</span>
      <button id="metrics-panel-close" class="side-panel-close" type="button" title="Collapse panel">Hide</button>
    </div>
    <div id="metrics-panel-body">
      <div id="metrics-status">Waiting for learner metrics server…</div>
      <iframe id="metrics-frame" title="SAC training metrics" src="about:blank"></iframe>
    </div>
  </aside>
  <script>
    const canvas = document.getElementById("view");
    const ctx = canvas.getContext("2d");
    const plotsPanelEl = document.getElementById("plots-panel");
    const plotsPanelTabEl = document.getElementById("plots-panel-tab");
    const plotsPanelCloseEl = document.getElementById("plots-panel-close");
    const plotCanvas = document.getElementById("plot-canvas");
    const plotCtx = plotCanvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const toggleMapEl = document.getElementById("toggle-map");
    const toggleHistoryEl = document.getElementById("toggle-history");
    const toggleTrackBordersEl = document.getElementById("toggle-track-borders");
    const toggleCarInfoEl = document.getElementById("toggle-car-info");
    const togglePlotsEl = document.getElementById("toggle-plots");
    const toggleSacMetricsEl = document.getElementById("toggle-sac-metrics");
    const metricsPanelEl = document.getElementById("metrics-panel");
    const metricsPanelTabEl = document.getElementById("metrics-panel-tab");
    const metricsPanelCloseEl = document.getElementById("metrics-panel-close");
    const metricsStatusEl = document.getElementById("metrics-status");
    const metricsFrameEl = document.getElementById("metrics-frame");
    let sacMetricsAvailable = false;
    let metricsServerConnected = false;
    let metricsUiConfig = null;
    let plotsPanelOpen = true;
    let metricsPanelOpen = false;
    let mapMeta = null;
    let mapImg = null;
    let latest = null;
    let latestSimulationTime = 0.0;
    let latestSimAtPoll = 0.0;
    let latestPollWallTimeS = 0.0;
    let prevPollSimTime = null;
    let prevPollWallTimeS = null;
    let simTimeRate = 1.0; // simulated seconds per wall second
    let observedFetchIntervalS = 0.1;
    let lastFetchCompleteWallS = null;
    let lastFrameId = 0;
    let staticOverlay = {};
    let frameBuffer = [];
    let playbackSimTime = null;
    let lastDrawWallTimeS = null;
    let cameraFollowEgo = true;
    let cameraCenter = null;
    const BUFFER_WINDOW_S = 2.5;
    const TARGET_BUFFER_DELAY_S = 1.8;
    const MIN_BUFFER_DELAY_S = 1.2;
    const HISTORY_POLL_MS = 100;
    const REQUEST_OVERLAP_FRAMES = 12;
    const MAX_INFLIGHT_FETCHES = 2;
    let inflightFetches = 0;
    let clientSessionId = null;
    let zoom = 60.0; // pixels per meter
    const ZOOM_MIN = 15.0;
    const ZOOM_MAX = 300.0;
    const ZOOM_FACTOR = 1.15;
    let isDragging = false;
    let dragLastX = 0.0;
    let dragLastY = 0.0;
    let dragMovedPx = 0.0;
    let isPinching = false;
    let pinchStartDist = 0.0;
    let pinchStartZoom = 60.0;
    const DOUBLE_TAP_MS = 350;
    const DOUBLE_TAP_DIST_PX = 28;
    let lastTapTime = 0.0;
    let lastTapX = 0.0;
    let lastTapY = 0.0;
    const viewerId = `viewer-${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
    let showMap = true;
    let showPositionHistory = false;
    let showTrackBorders = true;
    let showCarStateInfo = false;
    let browserPositionHistory = [];
    let browserHistoryLastFrameId = 0;
    const MAX_BROWSER_HISTORY_POINTS = 20000;
    const TIME_SERIES_PLOT_WINDOW_S = 10.0;
    const TIME_SERIES_PLOT_MAX_SAMPLES = 900;
    const CONTROL_ANGULAR_KEY = "0: angular_control";
    const CONTROL_TRANSLATIONAL_KEY = "1: translational_control";
    const STATE_PLOT_COLOR_CYCLE = [
      "rgb(255, 179, 71)",
      "rgb(118, 215, 196)",
      "rgb(186, 154, 255)",
      "rgb(255, 138, 128)",
      "rgb(129, 201, 149)",
      "rgb(138, 180, 248)",
    ];
    const STATE_KEY_ORDER = [
      "speed",
      "yaw",
      "reward",
      "distance to raceline",
      "wp_idx",
      "surface friction",
    ];
    let timeSeriesData = {};
    let controlPlotKeys = [CONTROL_ANGULAR_KEY, CONTROL_TRANSLATIONAL_KEY];
    let statePlotKeys = [];
    let lastPlotLayoutKey = "";

    function plotLayoutKey() {
      return `${controlPlotKeys.join("|")}::${statePlotKeys.join("|")}`;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      maybeResizePlotCanvas(true);
    }

    function resizePlotCanvas() {
      const subplotCount = Math.max(1, controlPlotKeys.length + statePlotKeys.length);
      const layoutHeight = Math.max(280, subplotCount * 108 + 48);
      plotCanvas.style.height = `${layoutHeight}px`;
      const dpr = window.devicePixelRatio || 1;
      const rect = plotCanvas.getBoundingClientRect();
      plotCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
      plotCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
      plotCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function maybeResizePlotCanvas(force = false) {
      if (!plotsPanelOpen) return;
      const key = plotLayoutKey();
      if (!force && key === lastPlotLayoutKey) return;
      lastPlotLayoutKey = key;
      resizePlotCanvas();
    }

    function updateSidePanelLayout() {
      if (plotsPanelOpen && metricsPanelOpen) {
        metricsPanelEl.style.left = `${plotsPanelEl.getBoundingClientRect().width}px`;
      } else {
        metricsPanelEl.style.left = "0";
      }
    }

    function updatePlotsPanelChrome() {
      plotsPanelEl.classList.toggle("open", plotsPanelOpen);
      plotsPanelEl.setAttribute("aria-hidden", plotsPanelOpen ? "false" : "true");
      plotsPanelTabEl.style.display = plotsPanelOpen ? "none" : "block";
      togglePlotsEl.classList.toggle("active", plotsPanelOpen);
      togglePlotsEl.setAttribute("aria-pressed", plotsPanelOpen ? "true" : "false");
      togglePlotsEl.textContent = plotsPanelOpen
        ? "Hide control & state plots"
        : "Control & state plots";
      updateSidePanelLayout();
    }

    function updateMetricsPanelChrome() {
      metricsPanelEl.classList.toggle("open", metricsPanelOpen);
      metricsPanelEl.setAttribute("aria-hidden", metricsPanelOpen ? "false" : "true");
      metricsPanelTabEl.style.display =
        sacMetricsAvailable && !metricsPanelOpen ? "block" : "none";
      toggleSacMetricsEl.style.display = sacMetricsAvailable ? "inline-block" : "none";
      toggleSacMetricsEl.classList.toggle("active", metricsPanelOpen);
      toggleSacMetricsEl.setAttribute("aria-pressed", metricsPanelOpen ? "true" : "false");
      toggleSacMetricsEl.textContent = metricsPanelOpen
        ? "Hide training metrics"
        : "Training metrics";
      updateSidePanelLayout();
    }

    function setPlotsPanelOpen(open) {
      plotsPanelOpen = !!open;
      updatePlotsPanelChrome();
      if (plotsPanelOpen) maybeResizePlotCanvas(true);
    }

    function setMetricsPanelOpen(open) {
      if (!sacMetricsAvailable) return;
      metricsPanelOpen = !!open;
      updateMetricsPanelChrome();
      if (metricsPanelOpen) ensureMetricsFrameLoaded(true);
    }

    function worldToScreen(x, y, cx, cy) {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      const sx = (x - cx) * zoom + 0.5 * w;
      const sy = h - ((y - cy) * zoom + 0.5 * h);
      return [sx, sy];
    }

    function screenToWorld(sx, sy, cx, cy) {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      const x = cx + (sx - 0.5 * w) / zoom;
      const y = cy + (0.5 * h - sy) / zoom;
      return [x, y];
    }

    function applyZoomAtScreen(factor, sx, sy) {
      if (cameraCenter === null && latest?.poses?.length > 0) {
        const ego = latest.poses[latest.ego_idx || 0];
        cameraCenter = [ego[0], ego[1]];
      }
      if (cameraCenter === null) {
        zoom = clamp(zoom * factor, ZOOM_MIN, ZOOM_MAX);
        return;
      }
      const cx = cameraCenter[0];
      const cy = cameraCenter[1];
      const [wx0, wy0] = screenToWorld(sx, sy, cx, cy);
      const newZoom = clamp(zoom * factor, ZOOM_MIN, ZOOM_MAX);
      if (Math.abs(newZoom - zoom) < 1e-6) return;
      zoom = newZoom;
      const [wx1, wy1] = screenToWorld(sx, sy, cx, cy);
      cameraCenter = [cx + wx0 - wx1, cy + wy0 - wy1];
    }

    function toggleCameraFollow() {
      cameraFollowEgo = !cameraFollowEgo;
      updateFollowButton();
    }

    function updateFollowButton() {
      const btn = document.getElementById("toggle-follow");
      if (!btn) return;
      btn.classList.toggle("active", cameraFollowEgo);
      btn.textContent = cameraFollowEgo ? "Following car" : "Free view";
      btn.setAttribute("aria-pressed", cameraFollowEgo ? "true" : "false");
      btn.title = cameraFollowEgo
        ? "Unlock view (double-tap track)"
        : "Lock view to car (double-tap track)";
    }

    function touchDistance(t0, t1) {
      const dx = t1.clientX - t0.clientX;
      const dy = t1.clientY - t0.clientY;
      return Math.hypot(dx, dy);
    }

    function handleDoubleTap(clientX, clientY) {
      const now = performance.now();
      const dt = now - lastTapTime;
      const dist = Math.hypot(clientX - lastTapX, clientY - lastTapY);
      if (dt > 0 && dt < DOUBLE_TAP_MS && dist < DOUBLE_TAP_DIST_PX) {
        toggleCameraFollow();
        lastTapTime = 0;
        return true;
      }
      lastTapTime = now;
      lastTapX = clientX;
      lastTapY = clientY;
      return false;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function rgb(color, fallback) {
      if (Array.isArray(color) && color.length >= 3) {
        return `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
      }
      return fallback;
    }

    function parseNumeric(value) {
      if (typeof value === "number" && Number.isFinite(value)) return value;
      if (typeof value === "string") {
        const parsed = Number.parseFloat(value);
        if (Number.isFinite(parsed)) return parsed;
      }
      return null;
    }

    function normalizeLabelName(key) {
      const lowered = String(key || "").trim().toLowerCase();
      return lowered.replace(/^\d+\s*:\s*/, "");
    }

    function isControlLabelKey(key) {
      const norm = normalizeLabelName(key);
      return norm.includes("angular_control") || norm.includes("translational_control");
    }

    function resolveControlKey(labels, preferredKey, containsText) {
      if (!labels || typeof labels !== "object") return null;
      if (parseNumeric(labels[preferredKey]) !== null) return preferredKey;
      for (const key of Object.keys(labels)) {
        if (parseNumeric(labels[key]) === null) continue;
        const norm = normalizeLabelName(key);
        if (norm.includes(containsText)) return key;
      }
      return null;
    }

    function sortStatePlotKeys(keys) {
      const rank = (key) => {
        const norm = normalizeLabelName(key);
        const idx = STATE_KEY_ORDER.findIndex((hint) => norm.includes(hint));
        return idx >= 0 ? idx : STATE_KEY_ORDER.length + 1;
      };
      return [...keys].sort((a, b) => {
        const ra = rank(a);
        const rb = rank(b);
        if (ra !== rb) return ra - rb;
        return normalizeLabelName(a).localeCompare(normalizeLabelName(b));
      });
    }

    function discoverPlotKeys(labels) {
      const angularKey = resolveControlKey(labels, CONTROL_ANGULAR_KEY, "angular_control");
      const translationalKey = resolveControlKey(labels, CONTROL_TRANSLATIONAL_KEY, "translational_control");
      const nextControlKeys = [angularKey, translationalKey].filter((k) => !!k);
      const nextStateKeys = sortStatePlotKeys(
        Object.keys(labels).filter((key) => !isControlLabelKey(key) && parseNumeric(labels[key]) !== null)
      );
      const controlChanged = controlPlotKeys.join("|") !== nextControlKeys.join("|");
      const stateChanged = statePlotKeys.join("|") !== nextStateKeys.join("|");
      if (controlChanged || stateChanged) {
        timeSeriesData = {};
      }
      controlPlotKeys = nextControlKeys;
      statePlotKeys = nextStateKeys;
      if (controlChanged || stateChanged) {
        lastPlotLayoutKey = "";
      }
    }

    function trimTimeSeries(minTime) {
      for (const key of [...controlPlotKeys, ...statePlotKeys]) {
        const series = timeSeriesData[key];
        if (!Array.isArray(series) || series.length === 0) continue;
        let cutIdx = 0;
        while (cutIdx < series.length - 1 && series[cutIdx][0] < minTime) {
          cutIdx += 1;
        }
        if (cutIdx > 0) series.splice(0, cutIdx);
      }
    }

    function updateTimeSeriesPlots(frame) {
      if (!frame) return;
      const labels = frame.web_overlay?.label_dict || {};
      const timeS = Number(frame.simulation_time || 0.0);
      discoverPlotKeys(labels);

      const allKeys = [...controlPlotKeys, ...statePlotKeys];
      if (allKeys.length === 0) return;

      for (const key of allKeys) {
        const val = parseNumeric(labels[key]);
        if (val === null) continue;
        if (!Array.isArray(timeSeriesData[key])) timeSeriesData[key] = [];
        timeSeriesData[key].push([timeS, val]);
        if (timeSeriesData[key].length > TIME_SERIES_PLOT_MAX_SAMPLES) {
          timeSeriesData[key].splice(0, timeSeriesData[key].length - TIME_SERIES_PLOT_MAX_SAMPLES);
        }
      }
      trimTimeSeries(Math.max(0.0, timeS - TIME_SERIES_PLOT_WINDOW_S));
    }

    function plotColorForKey(key, index) {
      if (isControlLabelKey(key)) {
        const norm = normalizeLabelName(key);
        if (norm.includes("angular_control")) return STATE_PLOT_COLOR_CYCLE[0];
        if (norm.includes("translational_control")) return STATE_PLOT_COLOR_CYCLE[1];
      }
      return STATE_PLOT_COLOR_CYCLE[index % STATE_PLOT_COLOR_CYCLE.length];
    }

    function drawTimeSeriesPlots(frame) {
      const allKeys = [...controlPlotKeys, ...statePlotKeys];
      const rect = plotCanvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      plotCtx.clearRect(0, 0, w, h);
      plotCtx.fillStyle = "rgba(4, 12, 38, 0.95)";
      plotCtx.fillRect(0, 0, w, h);
      if (!frame || allKeys.length === 0) {
        plotCtx.fillStyle = "rgba(255, 255, 255, 0.7)";
        plotCtx.font = "12px sans-serif";
        plotCtx.fillText("Waiting for control and state telemetry...", 14, 22);
        return;
      }

      const padLeft = 54;
      const padRight = 14;
      const padTop = 10;
      const padBottom = 26;
      const plotW = Math.max(1, w - padLeft - padRight);
      const plotH = Math.max(1, h - padTop - padBottom);
      const nowT = Number(frame.simulation_time || 0.0);
      const minT = Math.max(0.0, nowT - TIME_SERIES_PLOT_WINDOW_S);
      const subplotGap = 10;
      const subplotCount = allKeys.length;
      const subplotH = (plotH - subplotGap * (subplotCount - 1)) / subplotCount;

      function drawSubplot(key, index, color) {
        const title = normalizeLabelName(key);
        const y0 = padTop + index * (subplotH + subplotGap);
        const y1 = y0 + subplotH;
        const series = timeSeriesData[key] || [];
        let yMin = Infinity;
        let yMax = -Infinity;
        for (const [t, v] of series) {
          if (t < minT) continue;
          if (v < yMin) yMin = v;
          if (v > yMax) yMax = v;
        }
        if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) {
          yMin = -1.0;
          yMax = 1.0;
        }
        const span = Math.max(1e-3, yMax - yMin);
        const yPad = 0.14 * span;
        const plotMin = yMin - yPad;
        const plotMax = yMax + yPad;
        const plotSpan = Math.max(1e-3, plotMax - plotMin);

        plotCtx.strokeStyle = "rgba(255, 255, 255, 0.22)";
        plotCtx.lineWidth = 1;
        for (let j = 0; j <= 3; j++) {
          const gy = y0 + (j / 3) * subplotH;
          plotCtx.beginPath();
          plotCtx.moveTo(padLeft, gy);
          plotCtx.lineTo(padLeft + plotW, gy);
          plotCtx.stroke();
        }
        plotCtx.beginPath();
        plotCtx.moveTo(padLeft, y0);
        plotCtx.lineTo(padLeft, y1);
        plotCtx.lineTo(padLeft + plotW, y1);
        plotCtx.stroke();

        plotCtx.strokeStyle = color;
        plotCtx.lineWidth = 1.7;
        let drew = false;
        plotCtx.beginPath();
        for (const [t, v] of series) {
          if (t < minT) continue;
          const tx = (t - minT) / TIME_SERIES_PLOT_WINDOW_S;
          const ty = (v - plotMin) / plotSpan;
          const x = padLeft + tx * plotW;
          const y = y0 + (1.0 - ty) * subplotH;
          if (!drew) {
            plotCtx.moveTo(x, y);
            drew = true;
          } else {
            plotCtx.lineTo(x, y);
          }
        }
        if (drew) plotCtx.stroke();

        plotCtx.fillStyle = "rgba(255, 255, 255, 0.78)";
        plotCtx.font = "10px sans-serif";
        plotCtx.fillText(plotMax.toFixed(3), 4, y0 + 10);
        plotCtx.fillText(plotMin.toFixed(3), 4, y1 - 2);
        plotCtx.fillStyle = "#e8eaed";
        plotCtx.font = "bold 12px sans-serif";
        plotCtx.fillText(title, padLeft + 6, y0 + 13);
      }

      allKeys.forEach((key, index) => {
        drawSubplot(key, index, plotColorForKey(key, index));
      });

      plotCtx.fillStyle = "rgba(255, 255, 255, 0.78)";
      plotCtx.font = "11px sans-serif";
      plotCtx.fillText(`${minT.toFixed(1)}s`, padLeft, h - 8);
      plotCtx.fillText(`${nowT.toFixed(1)}s`, padLeft + plotW - 36, h - 8);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleLerp(a, b, t) {
      let d = b - a;
      while (d > Math.PI) d -= 2 * Math.PI;
      while (d < -Math.PI) d += 2 * Math.PI;
      return a + d * t;
    }

    function angleDelta(a, b) {
      let d = b - a;
      while (d > Math.PI) d -= 2 * Math.PI;
      while (d < -Math.PI) d += 2 * Math.PI;
      return d;
    }

    function interpolateState(a, b, t) {
      const overlaySource = t < 0.5 ? (a.web_overlay || {}) : (b.web_overlay || {});
      const poses = [];
      const n = Math.min(a.poses?.length || 0, b.poses?.length || 0);
      for (let i = 0; i < n; i++) {
        const pa = a.poses[i];
        const pb = b.poses[i];
        poses.push([
          lerp(pa[0], pb[0], t),
          lerp(pa[1], pb[1], t),
          angleLerp(pa[2], pb[2], t),
        ]);
      }
      return {
        ego_idx: b.ego_idx ?? a.ego_idx ?? 0,
        simulation_time: lerp(a.simulation_time || 0.0, b.simulation_time || 0.0, t),
        poses: poses,
        web_overlay: overlaySource,
      };
    }

    function extrapolateState(prev, last, targetTime) {
      if (!prev || !last) return last;
      const dt = Math.max(1e-6, last.simulation_time - prev.simulation_time);
      const extra = Math.max(0.0, targetTime - last.simulation_time);
      // Short extrapolation only; beyond this we prefer holding last sample.
      const extraClamped = Math.min(extra, 0.15);

      const poses = [];
      const n = Math.min(prev.poses?.length || 0, last.poses?.length || 0);
      for (let i = 0; i < n; i++) {
        const p0 = prev.poses[i];
        const p1 = last.poses[i];
        const vx = (p1[0] - p0[0]) / dt;
        const vy = (p1[1] - p0[1]) / dt;
        const w = angleDelta(p0[2], p1[2]) / dt;
        poses.push([
          p1[0] + vx * extraClamped,
          p1[1] + vy * extraClamped,
          p1[2] + w * extraClamped,
        ]);
      }
      return {
        ego_idx: last.ego_idx ?? 0,
        simulation_time: last.simulation_time + extraClamped,
        poses: poses,
        web_overlay: last.web_overlay || {},
      };
    }

    function stateForRender() {
      if (frameBuffer.length === 0) return null;
      if (frameBuffer.length === 1) return frameBuffer[0];

      const nowS = performance.now() / 1000.0;
      const oldestT = frameBuffer[0].simulation_time;
      const newestT = frameBuffer[frameBuffer.length - 1].simulation_time;

      if (playbackSimTime === null) {
        playbackSimTime = newestT - TARGET_BUFFER_DELAY_S;
        if (playbackSimTime < oldestT) playbackSimTime = oldestT;
        lastDrawWallTimeS = nowS;
      } else {
        const dtWall = Math.max(0.0, Math.min(0.1, nowS - (lastDrawWallTimeS ?? nowS)));
        lastDrawWallTimeS = nowS;

        // Keep horizon near target; gentle PLL-like correction.
        const currentHorizon = newestT - playbackSimTime;
        const horizonError = currentHorizon - TARGET_BUFFER_DELAY_S;
        const correction = Math.max(-0.08, Math.min(0.08, 0.04 * horizonError));
        const playbackRate = Math.max(0.2, simTimeRate * (1.0 + correction));

        if (currentHorizon > MIN_BUFFER_DELAY_S) {
          playbackSimTime += dtWall * playbackRate;
        }

        // Never run playback backward; keep inside available buffer.
        playbackSimTime = Math.max(playbackSimTime, oldestT);
        playbackSimTime = Math.min(playbackSimTime, newestT + 0.1);
      }
      const target = playbackSimTime;
      if (target <= frameBuffer[0].simulation_time) return frameBuffer[0];

      for (let i = 1; i < frameBuffer.length; i++) {
        const a = frameBuffer[i - 1];
        const b = frameBuffer[i];
        if (target <= b.simulation_time) {
          const dt = Math.max(1e-6, b.simulation_time - a.simulation_time);
          const t = Math.max(0.0, Math.min(1.0, (target - a.simulation_time) / dt));
          return interpolateState(a, b, t);
        }
      }
      const last = frameBuffer[frameBuffer.length - 1];
      const prev = frameBuffer.length > 1 ? frameBuffer[frameBuffer.length - 2] : null;
      return extrapolateState(prev, last, target);
    }

    function drawPoints(points, color, radius, cx, cy) {
      if (!Array.isArray(points)) return;
      ctx.fillStyle = color;
      for (const p of points) {
        if (!Array.isArray(p) || p.length < 2) continue;
        const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSinglePoint(pointList, color, radius, cx, cy) {
      if (!Array.isArray(pointList) || pointList.length === 0) return;
      const p = pointList[0];
      if (!Array.isArray(p) || p.length < 2) return;
      const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(sx, sy, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLine(points, color, lineWidth, cx, cy) {
      if (!Array.isArray(points) || points.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      points.forEach((p, idx) => {
        if (!Array.isArray(p) || p.length < 2) return;
        const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
        if (idx === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      });
      ctx.stroke();
    }

    function drawTrajectories(trajectories, color, radius, cx, cy) {
      if (!Array.isArray(trajectories)) return;
      ctx.fillStyle = color;
      for (const traj of trajectories) {
        if (!Array.isArray(traj)) continue;
        for (const p of traj) {
          if (!Array.isArray(p) || p.length < 2) continue;
          const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
          ctx.beginPath();
          ctx.arc(sx, sy, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    async function loadMap() {
      try {
        const r = await fetch("/map");
        mapMeta = await r.json();
        mapImg = new Image();
        mapImg.src = "/map-image";
      } catch (e) {
        console.error(e);
      }
    }

    async function loadStaticOverlay() {
      try {
        const r = await fetch("/overlay-static");
        staticOverlay = await r.json();
      } catch (e) {
        // Keep last static overlay on errors.
      }
    }

    function metricsDashboardUrl(port) {
      const host = window.location.hostname || "127.0.0.1";
      return `http://${host}:${port}/`;
    }

    function metricsBaseUrl(port) {
      return metricsDashboardUrl(port).replace(/\/$/, "");
    }

    function ensureMetricsFrameLoaded(force = false) {
      if (!sacMetricsAvailable || !metricsUiConfig) return;
      const port = Number(metricsUiConfig.metrics_port) || 5556;
      const base = metricsBaseUrl(port);
      const currentSrc = metricsFrameEl.getAttribute("src") || "";
      if (!force && metricsServerConnected && currentSrc.startsWith(base)) return;
      if (!metricsServerConnected && !force) return;
      metricsFrameEl.src = `${base}/?_=${Date.now()}`;
    }

    async function pollTelemetry() {
      try {
        const r = await fetch("/ui-config", { cache: "no-store" });
        if (!r.ok) return;
        const cfg = await r.json();
        metricsUiConfig = cfg;

        if (cfg.show_sac_metrics && !sacMetricsAvailable) {
          sacMetricsAvailable = true;
          updateMetricsPanelChrome();
          if (cfg.metrics_panel_open_default) {
            setMetricsPanelOpen(true);
          }
        }

        if (!cfg.show_sac_metrics) {
          return;
        }

        const port = Number(cfg.metrics_port) || 5556;
        const healthUrl = `${metricsBaseUrl(port)}/api/health`;
        try {
          const hr = await fetch(healthUrl, { cache: "no-store", mode: "cors" });
          if (!hr.ok) {
            metricsServerConnected = false;
            metricsStatusEl.textContent = "Waiting for learner metrics server…";
            return;
          }
          const wasConnected = metricsServerConnected;
          metricsServerConnected = true;
          metricsStatusEl.textContent = "Metrics live";
          if (!wasConnected || metricsPanelOpen) {
            ensureMetricsFrameLoaded(!wasConnected);
          }
        } catch (e) {
          metricsServerConnected = false;
          metricsStatusEl.textContent = "Waiting for learner metrics server…";
        }
      } catch (e) {
        // Renderer ui-config unavailable; retry on next poll.
      }
    }

    async function fetchStateHistoryTick() {
      if (inflightFetches >= MAX_INFLIGHT_FETCHES) {
        return;
      }
      inflightFetches += 1;
      try {
        const since = Math.max(0, lastFrameId - REQUEST_OVERLAP_FRAMES);
        const r = await fetch(`/state-history?since=${since}`);
        const payload = await r.json();
        const history = Array.isArray(payload.history) ? payload.history : [];
        const serverSessionId = payload.session_id || null;
        const incomingLatestFrameId = Number(payload.latest_frame_id || 0);
        if (serverSessionId !== null && clientSessionId !== null && serverSessionId !== clientSessionId) {
          // New backend instance detected: reset client-side state and continue seamlessly.
          frameBuffer = [];
          latest = null;
          latestSimulationTime = 0.0;
          latestSimAtPoll = 0.0;
          latestPollWallTimeS = 0.0;
          prevPollSimTime = null;
          prevPollWallTimeS = null;
          simTimeRate = 1.0;
          observedFetchIntervalS = 0.1;
          lastFetchCompleteWallS = null;
          lastFrameId = 0;
          playbackSimTime = null;
          lastDrawWallTimeS = null;
          browserPositionHistory = [];
          browserHistoryLastFrameId = 0;
          clientSessionId = serverSessionId;
          loadMap();
          loadStaticOverlay();
          statusEl.textContent = "Detected new experiment backend. Reconnected.";
        }
        if (clientSessionId === null && serverSessionId !== null) {
          clientSessionId = serverSessionId;
        }
        appendHistorySamples(history);
        // Ignore stale response snapshots that are older than what we already processed.
        if (incomingLatestFrameId + REQUEST_OVERLAP_FRAMES < lastFrameId) {
          return;
        }
        const newLatestSimulationTime = Number(payload.latest_simulation_time || 0.0);
        const nowWall = performance.now() / 1000.0;
        if (prevPollSimTime !== null && prevPollWallTimeS !== null) {
          const dSim = newLatestSimulationTime - prevPollSimTime;
          const dWall = Math.max(1e-6, nowWall - prevPollWallTimeS);
          const instRate = Math.max(0.1, Math.min(50.0, dSim / dWall));
          // Smooth estimate to avoid jitter in playback speed.
          simTimeRate = 0.8 * simTimeRate + 0.2 * instRate;
        }
        prevPollSimTime = newLatestSimulationTime;
        prevPollWallTimeS = nowWall;
        latestSimulationTime = newLatestSimulationTime;
        lastFrameId = Math.max(lastFrameId, incomingLatestFrameId);
        latestSimAtPoll = latestSimulationTime;
        latestPollWallTimeS = nowWall;

        const cutoff = latestSimulationTime - BUFFER_WINDOW_S;
        const mergedByFrameId = new Map();
        for (const s of [...frameBuffer, ...history]) {
          if (!s || !Number.isFinite(s.simulation_time) || !Number.isFinite(s.frame_id)) continue;
          if (s.simulation_time < cutoff) continue;
          const fid = Number(s.frame_id);
          const existing = mergedByFrameId.get(fid);
          if (!existing || s.simulation_time >= existing.simulation_time) {
            mergedByFrameId.set(fid, s);
          }
        }

        const merged = Array.from(mergedByFrameId.values()).sort((a, b) => {
          const ta = Number(a.simulation_time);
          const tb = Number(b.simulation_time);
          if (Math.abs(ta - tb) > 1e-9) return ta - tb;
          return Number(a.frame_id) - Number(b.frame_id);
        });

        // Ensure monotonic simulation_time in buffer (drop regressions).
        const monotonic = [];
        let lastT = -Infinity;
        for (const s of merged) {
          const t = Number(s.simulation_time);
          if (t + 1e-9 >= lastT) {
            monotonic.push(s);
            lastT = t;
          }
        }
        frameBuffer = monotonic;
        latest = frameBuffer.length > 0 ? frameBuffer[frameBuffer.length - 1] : null;

        const labels = latest?.web_overlay?.label_dict || {};
        const labelText = showCarStateInfo && Object.keys(labels).length > 0
          ? " | " + Object.entries(labels).map(([k, v]) => `${k}: ${v}`).join(" | ")
          : "";
        const camMode = cameraFollowEgo ? "follow-car" : "free";
        statusEl.textContent = `Sim time: ${(latestSimulationTime || 0).toFixed(2)} s | cars: ${(latest?.poses?.length || 0)} | cam: ${camMode} | zoom: ${zoom.toFixed(1)}${labelText}`;
      } catch (e) {
        statusEl.textContent = "Waiting for simulation state...";
      } finally {
        const now = performance.now() / 1000.0;
        if (lastFetchCompleteWallS !== null) {
          const interval = Math.max(0.01, now - lastFetchCompleteWallS);
          observedFetchIntervalS = 0.8 * observedFetchIntervalS + 0.2 * interval;
        }
        lastFetchCompleteWallS = now;
        inflightFetches = Math.max(0, inflightFetches - 1);
      }
    }

    function startHistoryPolling() {
      fetchStateHistoryTick();
      setInterval(fetchStateHistoryTick, HISTORY_POLL_MS);
    }

    function draw() {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#092057";
      ctx.fillRect(0, 0, w, h);

      const frame = stateForRender();
      if (frame) {
        updateTimeSeriesPlots(frame);
      }
      if (frame && frame.poses && frame.poses.length > 0) {
        const ego = frame.poses[frame.ego_idx || 0];
        if (cameraFollowEgo || cameraCenter === null) {
          cameraCenter = [ego[0], ego[1]];
        }
        const cx = cameraCenter[0];
        const cy = cameraCenter[1];
        const overlay = Object.assign({}, staticOverlay || {}, frame.web_overlay || {});
        const colors = overlay.colors || {};

        if (showMap && mapMeta && mapImg && mapImg.complete) {
          const mapWm = mapMeta.width * mapMeta.resolution;
          const mapHm = mapMeta.height * mapMeta.resolution;
          const [sx, syTop] = worldToScreen(mapMeta.origin[0], mapMeta.origin[1] + mapHm, cx, cy);
          const drawW = mapWm * zoom;
          const drawH = mapHm * zoom;
          ctx.globalAlpha = 0.85;
          ctx.drawImage(mapImg, sx, syTop, drawW, drawH);
          ctx.globalAlpha = 1.0;
        }

        // Base/static overlays first
        const globalWaypoints = overlay.global_waypoints || overlay.waypoints_global || overlay.waypoints;
        drawPoints(globalWaypoints, rgb(colors.waypoints, "rgb(64, 190, 255)"), 2.0, cx, cy);
        drawPoints(overlay.waypoints_alternative, "rgb(170,170,170)", 1.5, cx, cy);
        drawPoints(overlay.next_waypoints_alternative, rgb(colors.next_waypoints_alternative, "rgb(127,0,127)"), 2.0, cx, cy);
        drawPoints(overlay.next_waypoints, rgb(colors.next_waypoints, "rgb(0,127,0)"), 2.2, cx, cy);
        drawPoints(overlay.lidar_border_points, rgb(colors.lidar, "rgb(255,0,255)"), 2.6, cx, cy);
        if (showTrackBorders) {
          const borderColor = rgb(colors.track_border, "rgb(255,0,0)");
          if (Array.isArray(overlay.track_border_lines) && overlay.track_border_lines.length > 0) {
            for (const borderLine of overlay.track_border_lines) {
              drawLine(borderLine, borderColor, 1.6, cx, cy);
            }
          } else {
            // Fallback for older payloads that only provide flattened points.
            drawPoints(overlay.track_border_points, borderColor, 1.8, cx, cy);
          }
        }
        drawPoints(overlay.obstacles, rgb(colors.obstacles, "rgb(255,0,0)"), 2.0, cx, cy);

        // Histories
        if (showPositionHistory) {
          drawTrajectories(browserPositionHistory, "rgba(70,160,255,0.55)", 1.8, cx, cy);
          drawPoints(overlay.past_car_states_alternative, rgb(colors.history_alt, "rgb(255,255,0)"), 2.0, cx, cy);
          drawPoints(overlay.past_car_states_gt, rgb(colors.history_gt, "rgb(0,128,255)"), 2.0, cx, cy);
          drawPoints(overlay.past_car_states_prior, rgb(colors.history_prior, "rgb(255,255,255)"), 2.0, cx, cy);
          drawPoints(overlay.past_car_states_prior_full, rgb(colors.history_prior_full, "rgb(0,255,255)"), 2.0, cx, cy);
        }

        // MPC overlays
        drawTrajectories(overlay.rollout_trajectory, rgb(colors.mppi, "rgb(250,25,30)"), 1.3, cx, cy);
        drawTrajectories(overlay.optimal_trajectory, rgb(colors.optimal, "rgb(255,165,0)"), 1.5, cx, cy);

        // Gap / target
        drawSinglePoint(overlay.largest_gap_middle_point, rgb(colors.gap, "rgb(0,255,0)"), 5.0, cx, cy);
        drawSinglePoint(overlay.target_point, rgb(colors.target, "rgb(255,204,0)"), 7.0, cx, cy);

        // Steering arrow and emergency slowdown lines
        if (overlay.steering_arrow && overlay.steering_arrow.start && overlay.steering_arrow.end) {
          drawLine([overlay.steering_arrow.start, overlay.steering_arrow.end], "rgb(0,204,0)", 2.0, cx, cy);
        }
        if (overlay.emergency_slowdown) {
          const s = overlay.emergency_slowdown;
          const factor = Math.max(0, Math.min(1, s.speed_reduction_factor ?? 1.0));
          const red = Math.floor((1 - factor) * 255);
          const green = Math.floor(factor * 255);
          const dynamicColor = `rgb(${red}, ${green}, 0)`;
          drawLine(s.left_line, dynamicColor, 2.0, cx, cy);
          drawLine(s.right_line, dynamicColor, 2.0, cx, cy);
          drawLine(s.stop_line, "rgb(255,0,0)", 2.0, cx, cy);
          if (Array.isArray(s.display_position) && s.display_position.length > 0 && factor < 1.0) {
            const p = s.display_position[0];
            const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
            ctx.fillStyle = dynamicColor;
            ctx.font = "12px sans-serif";
            ctx.fillText(factor.toFixed(2), sx, sy);
          }
        }

        frame.poses.forEach((p, i) => {
          const [sx, sy] = worldToScreen(p[0], p[1], cx, cy);
          const heading = p[2];
          const carLen = 0.58 * zoom;
          const carWid = 0.31 * zoom;
          ctx.save();
          ctx.translate(sx, sy);
          ctx.rotate(-heading);
          ctx.fillStyle = i === (frame.ego_idx || 0) ? "#ac61b9" : "#63345e";
          ctx.fillRect(-carLen / 2, -carWid / 2, carLen, carWid);
          ctx.restore();
        });
      }
      if (plotsPanelOpen) {
        maybeResizePlotCanvas();
        drawTimeSeriesPlots(frame);
      }
      requestAnimationFrame(draw);
    }

    function startDrag(clientX, clientY) {
      isDragging = true;
      dragLastX = clientX;
      dragLastY = clientY;
      dragMovedPx = 0.0;
      cameraFollowEgo = false;
      updateFollowButton();
      if (cameraCenter === null && latest?.poses?.length > 0) {
        const ego = latest.poses[latest.ego_idx || 0];
        cameraCenter = [ego[0], ego[1]];
      }
    }

    function updateDrag(clientX, clientY) {
      if (!isDragging || cameraCenter === null) return;
      const dxPx = clientX - dragLastX;
      const dyPx = clientY - dragLastY;
      dragMovedPx += Math.hypot(dxPx, dyPx);
      dragLastX = clientX;
      dragLastY = clientY;
      cameraCenter = [
        cameraCenter[0] - dxPx / zoom,
        cameraCenter[1] + dyPx / zoom,
      ];
    }

    function stopDrag() {
      isDragging = false;
    }

    function ensureHistoryCapacity(carCount) {
      while (browserPositionHistory.length < carCount) {
        browserPositionHistory.push([]);
      }
    }

    function appendHistorySamples(samples) {
      if (!Array.isArray(samples)) return;
      for (const s of samples) {
        if (!s || !Array.isArray(s.poses)) continue;
        const fid = Number(s.frame_id || 0);
        if (fid <= browserHistoryLastFrameId) continue;
        ensureHistoryCapacity(s.poses.length);
        for (let i = 0; i < s.poses.length; i++) {
          const p = s.poses[i];
          if (!Array.isArray(p) || p.length < 2) continue;
          const track = browserPositionHistory[i];
          track.push([Number(p[0]), Number(p[1])]);
          if (track.length > MAX_BROWSER_HISTORY_POINTS) {
            track.splice(0, track.length - MAX_BROWSER_HISTORY_POINTS);
          }
        }
        browserHistoryLastFrameId = fid;
      }
    }

    async function sendViewerHeartbeat() {
      try {
        await fetch(`/viewer-heartbeat?viewer_id=${encodeURIComponent(viewerId)}`, { cache: "no-store" });
      } catch (e) {
        // Ignore transient heartbeat errors; polling loop will retry.
      }
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "KeyF") {
        e.preventDefault();
        toggleCameraFollow();
      }
    });
    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? ZOOM_FACTOR : (1.0 / ZOOM_FACTOR);
      zoom = clamp(zoom * factor, ZOOM_MIN, ZOOM_MAX);
    }, { passive: false });
    canvas.addEventListener("dblclick", (e) => {
      e.preventDefault();
      toggleCameraFollow();
    });
    canvas.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      startDrag(e.clientX, e.clientY);
    });
    window.addEventListener("mousemove", (e) => {
      updateDrag(e.clientX, e.clientY);
    });
    window.addEventListener("mouseup", () => {
      stopDrag();
    });
    canvas.addEventListener("mouseleave", () => {
      stopDrag();
    });
    canvas.addEventListener("touchstart", (e) => {
      if (e.touches.length >= 2) {
        e.preventDefault();
        isPinching = true;
        isDragging = false;
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartZoom = zoom;
        cameraFollowEgo = false;
        updateFollowButton();
        if (cameraCenter === null && latest?.poses?.length > 0) {
          const ego = latest.poses[latest.ego_idx || 0];
          cameraCenter = [ego[0], ego[1]];
        }
        return;
      }
      if (e.touches.length === 1) {
        e.preventDefault();
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }
    }, { passive: false });
    canvas.addEventListener("touchmove", (e) => {
      if (e.touches.length >= 2 && isPinching) {
        e.preventDefault();
        const dist = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist < 1e-3) return;
        const rect = canvas.getBoundingClientRect();
        const midSx = (e.touches[0].clientX + e.touches[1].clientX) * 0.5 - rect.left;
        const midSy = (e.touches[0].clientY + e.touches[1].clientY) * 0.5 - rect.top;
        const targetZoom = clamp(pinchStartZoom * (dist / pinchStartDist), ZOOM_MIN, ZOOM_MAX);
        const factor = targetZoom / zoom;
        if (Math.abs(factor - 1.0) > 1e-6) {
          applyZoomAtScreen(factor, midSx, midSy);
        }
        return;
      }
      if (e.touches.length === 1 && isDragging && !isPinching) {
        e.preventDefault();
        const t = e.touches[0];
        updateDrag(t.clientX, t.clientY);
      }
    }, { passive: false });
    canvas.addEventListener("touchend", (e) => {
      if (e.touches.length > 0) {
        if (e.touches.length < 2) isPinching = false;
        return;
      }
      const wasPinching = isPinching;
      isPinching = false;
      if (!wasPinching && dragMovedPx < 12.0 && e.changedTouches.length >= 1) {
        const t = e.changedTouches[0];
        handleDoubleTap(t.clientX, t.clientY);
      }
      stopDrag();
    }, { passive: false });
    canvas.addEventListener("touchcancel", () => {
      stopDrag();
      isPinching = false;
    }, { passive: false });
    document.getElementById("toggle-follow").addEventListener("click", () => {
      toggleCameraFollow();
    });
    toggleMapEl.addEventListener("change", () => {
      showMap = !!toggleMapEl.checked;
    });
    toggleHistoryEl.addEventListener("change", () => {
      showPositionHistory = !!toggleHistoryEl.checked;
    });
    toggleTrackBordersEl.addEventListener("change", () => {
      showTrackBorders = !!toggleTrackBordersEl.checked;
    });
    toggleCarInfoEl.addEventListener("change", () => {
      showCarStateInfo = !!toggleCarInfoEl.checked;
    });
    togglePlotsEl.addEventListener("click", () => {
      setPlotsPanelOpen(!plotsPanelOpen);
    });
    plotsPanelTabEl.addEventListener("click", () => {
      setPlotsPanelOpen(true);
    });
    plotsPanelCloseEl.addEventListener("click", () => {
      setPlotsPanelOpen(false);
    });
    toggleSacMetricsEl.addEventListener("click", () => {
      if (!sacMetricsAvailable) return;
      setMetricsPanelOpen(!metricsPanelOpen);
    });
    metricsPanelTabEl.addEventListener("click", () => {
      setMetricsPanelOpen(true);
    });
    metricsPanelCloseEl.addEventListener("click", () => {
      setMetricsPanelOpen(false);
    });
    window.addEventListener("resize", updateSidePanelLayout);
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => {
        updateSidePanelLayout();
        if (plotsPanelOpen) maybeResizePlotCanvas(true);
      });
      ro.observe(plotsPanelEl);
      ro.observe(metricsPanelEl);
    }
    updatePlotsPanelChrome();
    updateMetricsPanelChrome();
    setInterval(pollTelemetry, 2000);
    pollTelemetry();
    sendViewerHeartbeat();
    setInterval(sendViewerHeartbeat, 2000);
    updateFollowButton();
    resizeCanvas();
    loadMap();
    loadStaticOverlay();
    startHistoryPolling();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
