# Yokomo mINITank – parameters for jax Pacejka + longitudinal slip driveline.
# vesc_speed in logs is motor ERPM; motor_angular_vel [rad/s] = ERPM * 2*pi/60.

mu: 0.5

lf: 0.13
lr: 0.12
h: 0.14
m: 2.9
I_z: 0.1
g: 9.81

width: 0.20
length: 0.35

s_min: -0.6
s_max: 0.6
sv_min: -6.2
sv_max: 6.2

a_max: 5.0
a_min: -5.0
v_min: -5.0
v_max: 10.0
v_switch: 7.319

servo_p: 10
steering_diff_low: 0.001

C_Pf: [5.0, 1.3, 1.0, 0.0]
C_Pr: [7.0, 1.1, 1.0, 0.0]

c_rr: 0.10
v_dead: 0.05
curve_resistance_factor: 0.44
brake_multiplier: 1.0

# Driveline / longitudinal slip (4WD locked, single motor speed state)
use_longitudinal_slip: true
drive_mode: torque
wheel_radius_m: 0.033
wheel_inertia_kg_m2: 0.00012
# Peak total wheel torque at full throttle (from log: I*K_t*gear up to ~3.4 N·m)
tau_wheel_max_nm: 8.0
tau_wheel_regen_max_nm: 8.0
omega_viscous_damping: 0.00002
kappa_den_min_m_s: 0.05
motor_longitudinal_tau_s: 0.04
motor_speed_torque_drop: 0.15

motor_current_max_a: 60.0
motor_K_t: 0.012
gear_ratio: 6.6

C_Pxf: [8.0, 1.9, 0.85, 0.97]
C_Pxr: [8.0, 1.9, 0.85, 0.97]

# Recovery from wheelspin: Fx drops after peak slip; drive torque cuts; wheels slow in spin.
kappa_long_peak: 0.10
kappa_long_falloff: 0.12
kappa_torque_cut_start: 0.14
kappa_torque_cut_gain: 5.0
kappa_spin_drag: 0.025
